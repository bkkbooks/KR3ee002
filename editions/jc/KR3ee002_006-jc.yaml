body:
  text: 卷之六點穴論千金云人有老少體有長短膚有肥瘦皆須精思斟量准而折之又以肌肉文理節解縫會宛陷之中及以手按之病者快然如此仔細安詳用心者乃能得之耳又云或身短而手長或身長而手短或胸腹長或胸腹短或大或小又不可以一概而論也凡點穴法皆要平正四體無使歪斜灸時恐穴不正徒壞好肉耳若坐點則坐灸臥點則臥灸立點則立灸反此一動則不得真穴矣凡灸先陽後陰先上後下先少後多皆宜審之論艾炷大小黃帝曰灸不三分是謂徒冤炷務大也小弱也乃小作之凡小兒七日以上周年以還不過七壯炷如雀糞大經云凡灸欲艾炷根下廣三分使火氣不能遠達病未能愈則是炷欲大惟頭與四肢欲小耳但去風邪而已論壯數多少千金云凡言壯數者若丁壯病根深篤可倍於方數老少羸弱可減半扁鵲灸法有至五百壯千壯曹氏灸法有百壯五十壯小品諸方亦然惟明堂本經多雲針入六分灸三壯更無餘論故後人不準惟以病之重輕而增損之凡灸頭頂上於七壯積至七七壯之銅人若治風則灸上星前頂百會皆至二百壯腹背宜灸五百壯若鳩尾巨闕亦不宜灸多多灸則四肢細而無力又足三里穴乃云多至三二百壯心俞禁灸若中風則急灸至百壯皆視其病之輕重而用之不可泥一說而又不知其有一說也下經只云若是禁灸穴明堂亦許灸一壯至三壯恐未盡也斯所謂五百壯千壯豈可一日而盡必待三五七日以至三年五年以盡其數乃可得也論點艾火下經云古來灸病忌松柏枳橘榆棗桑竹八木切宜避之凡取火若得火珠曜日以艾承之得火為妙次有火鏡曜日亦以艾引得火亦良余用鐵鑯擊䃈石得火亦可今人有清油點燈傳火點艾是也兼滋潤灸瘡至愈不疼痛用蠟燭更佳論避忌千金云欲行針灸必先知本人行年宜忌尻神及人神所在不與禁忌相干即可故男忌除女忌破男忌戌女忌巳又所謂血支血忌之類凡醫者不能知此避忌若逢病人危會男女氣怯下手即死達人智士拘於此若夫急難之際卒暴之疾命在須臾宜速治之若泥於禁忌已倫於鬼神豈不誤哉但一日止忌一時如子午八法不拘禁忌若治未形之病雖擇良日服藥針灸當也亦宜架天時日惡午以後不可灸謂陰氣未至灸無不著午前及早恐人氣虛有眩暈之咎急卒亦不可拘若值大風大雨雷電宜抽停之必待晴明又灸可也論治灸瘡凡著艾須要瘡發所患即瘥不得瘡發其疾不愈甲乙經云灸瘡不發者用故履底灸令熱熨之三日而發今又有用赤皮蔥三五莖去葉於微火中煨熟拘破熱熨瘡上十餘遍其瘡三日自發亦有用麻油搽之而發者亦有用皂角煎湯候冷頻點之而發者又恐氣血衰宜服四物湯滋養者蓋不可一概而論灸後務令瘡發而去病也凡貼瘡古人春用柳絮夏用竹膜秋用蠟葉冬用兔腹上白細毛貓腹上毛更佳今人每用膏藥貼之日一二易則瘡易愈無若一日兩貼一易使瘡膿出多而疾除也若欲用膏必須用真麻油入治病之藥或祛風散氣滋血療損之藥隨證入之為妙論忌食經已灸之後古人忌豬魚熱面生酒動風冷物雞肉最毒而今人灸瘡不發者用小雞鰱魚食之而發者所謂用毒而攻毒其理亦可行也但亦宜少用為佳論保養凡灸後切宜避風冷節飲酒戒房勞喜怒憂思悲恐七情之事須要除之可擇幽靜之居養之為善但君子智人不必喻也擇吉日針灸吉日丁卯庚午甲戌丙子丁丑壬午甲申丙戌丁亥辛卯壬辰丙申戊戌己亥庚子辛丑甲辰乙巳丙午戊申壬子癸丑乙卯丙辰己未壬戌成開執日忌辛未扁鵲死日吉日月正二三四五六七八九十十一十二天巫辰巳午未申酉戌亥子醜寅卯天醫醜寅卯辰巳午未申酉戌亥子要安寅申卯酉辰戌巳亥午子未醜凶日正二三四五六七八九十十一十二白虎黑道午申戌子寅辰午申戌子寅辰月厭戌酉申未午巳辰卯寅醜子亥月煞醜戌未辰醜戌未辰醜戌未辰獨火巳辰卯寅醜子亥戌酉申未午死別戌戌戌醜醜醜辰辰辰未未未血支醜寅卯辰巳午未申酉戌亥子血忌丑未寅申卯酉辰戌巳亥子午除日卯辰巳午未申酉戌亥子醜寅破日申酉戌亥子醜寅卯辰巳午未火隔午辰寅子戌申午辰寅子戌申遊禍忌服藥巳寅亥申巳寅亥申巳寅亥申定取四花六穴之穴崔氏灸骨蒸癆瘵若人初得此疾即便如此法灸之無不效者但醫者多不得真穴以致有誤今具真格使學者一見了然無誤豈非活人之心哉廷瑞謹識先用細繩一條約三四尺以蠟抽之勿令展縮以病人腳底貼肉量男取左足女取右足從足大拇指頭齊起從腳板底當腳跟中心向後引繩循腳肚貼肉直上至膝腕曲叉中大橫紋截斷次令病人解發分開兩邊令見頭縫自囟門平分至腦後乃平身正坐取前所截繩子一頭從鼻端齊引繩向上正循頭縫至腦後貼肉垂下循脊骨引繩向下至繩盡處當脊骨以墨點記此墨不是灸穴別以稻稈心令病人合口將稈心按於口上兩頭至吻卻勾起稈心中心至鼻端根下如人字樣齊兩吻截斷將稈展直於先在脊中墨記處取中橫量勿令高下於稈心兩頭以墨點之此是灸穴名曰患門二穴初灸七壯累灸至一百壯妙初只灸此二穴次令其人平身正坐稍縮臂膊取一繩繞項向前平結喉骨乃平大杼骨俱以點記向前雙垂下與鳩尾齊即截斷灸鳩尾穴竟卻翻繩向後以繩原點結喉墨放大杼上大杼墨放結喉上脊中雙繩頭齊會處以墨點記此亦不是灸穴別取稈心令其人合口無得動笑橫量齊兩吻截斷還於背上墨記處摺中橫量兩頭點之此是灸穴又將循脊直量上下點之此是灸穴名曰四花穴初灸七壯累灸至百壯迨瘡愈疾未愈依前法復灸故云累灸至百壯但當脊骨上兩穴切宜少灸凡一次只可灸三五壯多灸恐人蜷背凡灸此六穴亦要灸足三里以瀉火氣為妙若婦人纏帛裹足以至短小所取第一次患門穴難以準確但取右手肩髃穴貼肉量至中指為畫亦可不若只取膏肓穴灸之其穴備載於後次灸四花穴亦效予嘗見人初有此疾即與依法灸之無有不效微恐病根深固亦依此法灸之亦有可愈者況初病乎具圖於此千金方論取膏肓俞穴法膏肓俞穴無所不治主羸瘦虛損夢中失精上氣咳逆狂或失志誤取穴之法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得搖動從胛骨上角摸索至胛骨下頭其間當有四肋三間灸中間依胛骨之裡肋間深處是穴骨容側指許摩肋肉之表筋骨空處按之但覺牽引骨節動灸兩胛中各一穴至六百壯多至千壯當覺氣下礱上然如若水狀亦當有所下出非無停痰宿疾則無所下也若病人已困不能正坐當令側臥換一臂令前求穴灸之也求穴大法以右手從左肩上住指頭表所不及者是也左手亦然乃以前法灸之若不能久正坐常伸兩臂亦可伏衣袱上伸兩臂令人挽兩胛骨使相離不爾胛骨遮穴不可得也所伏衣袱當令大小常定不然則失其穴此灸訖後令人陽氣康盛當消息以自補養身體平復其穴在五椎之上四椎之下橫去六寸許相准望取之論曰昔秦緩不救晉侯之疾以在膏之下肓之上針藥所不及即此穴也孫真人笑其拙不能求得此穴所以宿疴難遣若能用心方便必得灸之無疾不愈矣具而明白備載於此學者仔細詳審依法取之無不得其真穴也一取穴法醫者先自坐以目平正卻於壁上以墨作一大圈卻令患者坐常使其目視圈無得斜視別處此亦良法也令灸人正坐曲脊伸臂依法醫士以指揣頸後脊骨一節為一寸自一柱至五柱逐一墨點記令上下端直分明且人有頸骨者亦有無者當以平肩為一柱是也以四柱至五柱用稈心比量兩柱上下遠近摺為三分亦以墨界脊上柱間取第四柱下二分微多五柱上一分微少用筆點定橫過相去六寸之中左右以為兩穴交下遠近之准大要兩柱上下合同身寸一寸三分七纏微縮有無大段長短不同以參考甲乙經自大杼至尾骶作二十一柱量三尺之數分之若柱節分明縱之尺寸不同穴以柱數為定若人肥大背厚骨節難尋當以平臍十四柱命門穴為準上自大杼下至命門摺為一十四柱每柱一寸三分合其穴無不真矣取腎俞穴法令患人平身垂手正立於平正木石之上目無斜視身無偏屈去上衣服用勁直杖子從地比至臍中央截斷卻回杖子於背上當脊骨中杖盡處即是十四柱命門穴也以墨記卻用稈心取同身三寸摺作一寸五分兩頭是腎俞穴也取騎竹馬灸穴法其法從男左女右臂腕中橫紋起用薄篾一條量至中指齊肉盡處不量爪甲截斷次用薄篾取前同身寸一寸則可卻令病人脫去上下衣服以大竹槓一條跨定兩人隨徐扛起足要離地五寸許兩旁更以兩人扶定毋令搖不穩卻以前量長篾點定竹槓豎起從尾骶骨貼脊量至篾盡處以筆點記此不是灸穴卻用後取同身寸篾取兩寸平摺自中穴橫量兩旁各一寸方是灸穴可灸三七壯此二穴專治癰疽惡瘡發背癤𤸚瘰癧諸風灸之極效如神灸心氣穴法先將稈心一條長者比男左女右手掌內大拇指根橫紋量至爪甲內止以墨點記次比鹽指中指四指小指五指皆比如前法再加同身寸一寸點定別用稈心一條與先所量稈心般齊至再加一寸墨上共結一磊卻令病人正坐脫去上衣以稈心分開加於頸上以指按定磊於天突骨上兩邊垂向背後以兩條稈心取般齊垂下脊中盡處是穴可灸五壯七壯神效論一穴有二名後頂一名交沖強間一名大羽腦戶一名合顱風府一名舌本腦空一名顳顬顱囟一名顱息瘈脈一名資脈素髎一名面正水溝一名人中承漿一名懸漿廉泉一名結本睛明一名淚孔巨髎一名巨窌絲竹空一名目髎頰車一名機關肩井一名膊井臑會一名臑髎大杼一名百勞命門一名屬累風門一名熱府督俞一名高蓋中膂內俞一名脊內俞會陽一名利機天窗一名窗籠天鼎一名天頂扶突一名水穴缺盆一名天蓋人迎一名五會天突一名天瞿玉堂一名玉英腧府一名輸府中府一名府中俞天池一名天會中脘一名太倉水分一名分水神闕一名氣舍會陰一名屏翳四滿一名髓府橫骨一名曲骨端氣衝一名氣街腹結一名腸窟衝門一名慈宮太淵一名太泉商陽一名絕陽二門一名間谷三間一名少谷合谷一名虎口陽谿一名中魁三里一名手三里少衝一名經始神門一名兌沖少海一名曲節少澤一名小吉天泉一名天溫陽池一名別陽支溝一名飛虎中都一名中郄中封一名懸泉蠡溝一名交儀陰包一名陰胞懸鐘一名絕骨漏谷一名太陰絡地機一名脾舍血海一名百蟲窠下廉一名下巨虛上廉一名上巨虛陰市一名陰鼎伏兔一名外勾湧泉一名地衝太谿一名呂細然谷一名龍淵照海一名陰蹺申脈一名陽蹺金門一名關梁僕參一名安邪崑崙一名下崑崙付陽一名跗陽飛揚一名厥陽環跳一名臏骨然谷一名然骨論一穴有三名絡卻一名強陽一名腦蓋禾髎一名長髎一名禾窌童子髎一名太陽一名前關上關一名容主一名客主聽會一名聽河一名後關前關一名童子髎一名太陽肩髃一名中肩井一名扁骨脊中一名神宗一名脊腧膻中一名亶中一名元兒鳩尾一名尾翳一名𩩲骬上脘一名上管一名胃脘關元一名丹田一名大中極氣海一名脖胦一名下肓中極一名玉泉一名氣原氣穴一名胞門一名子戶大赫一名陰維一名陰關天樞一名長谿一名榖門日月一名神光一名膽募京門一名氣俞一名氣府溫溜一名蛇頭一名逆注勞宮一名五里一名掌中陽交一名別陽一名足窌陽關一名陽陵一名關陵承筋一名腨腸一名直腸復溜一名昌陽