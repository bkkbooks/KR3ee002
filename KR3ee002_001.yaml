body:
  text: 卷之一周身經穴賦手太陰肺大指側少商魚際兮太淵穴經渠兮列缺孔最兮尺澤俠白共天府為鄰雲門與中府相接手陽明兮大腸之經循商陽二間三間而行歷合谷陽溪之腧過偏歷溫溜之濱下廉上廉三里而近曲池肘髎五里之程臑髃上於巨骨天鼎紆乎扶突禾髎唇連迎香鼻迫胃乃足之陽明厲兌趨乎內庭過陷谷衝陽之分見解溪豐隆之神下巨虛兮條口陳上巨虛兮三里仍犢鼻引入梁丘陰市之下伏兔上貫髀關氣衝之經歸來兮水道大巨兮外陵運天樞兮滑肉禮太乙兮關門梁門兮承滿不容兮乳根乳中之膺窗屋翳庫房之氣戶缺盆氣舍水突人迎大迎地倉兮巨髎續四白兮承泣分御頰車於下關張頭維於額垠足太陰兮脾中州隱白出兮大指頭赴大都兮瞻太白訪公孫兮至商丘越三陰之交而漏谷地機可即步陰陵之泉而血海箕門是求入衝門兮府舍軒豁解腹結兮大橫優遊腹哀食竇兮接天溪而同派胸鄉周榮兮綴大包而如鉤逮夫真心為手少陰少衝出乎小指少府直乎神門陰郤通里兮靈道非遠少海青靈兮極泉何深手之太陽小腸之滎路從少澤步前谷後溪之隆道遵腕骨觀陽谷養老之崇得支正於小海逐肩貞以相從值臑腧兮遇天宗乘秉風兮曲垣中肩外俞兮肩中俞啓天窗兮見天容匪由顴髎曷造聽宮足膀胱兮太陽交背部之二行窮至陰於通谷之口尋束骨於京骨之鄉申脈命僕參以前導崑崙闢金門於踝旁奮附陽飛揚之志轉承山承筋之行至於合陽委中委陽浮郤殷門以相從承扶秩邊而胞肓入志室兮肓門胃倉開意舍兮振彼陽綱出魂門兮膈關乃噫嘻乎神堂膏肓兮在四椎之左右魄戶兮隨附分而會陽下中次上之髎白環中膂之房膀胱俞兮小腸大腸俞兮在傍三焦腎俞兮胃俞接脾膽肝膈兮心俞當厥陰肺俞之募風門大杼之方天柱豎兮玉枕絡卻通天豁兮見彼承光自五處曲差而下造攢竹睛明之場足少陰兮腎屬湧泉流於然谷太溪大鐘兮水泉緣照海復溜兮交信續從築賓兮上陰谷掩橫骨兮大赫麓氣穴四滿兮中注肓俞上通兮商曲守石關兮陰都寧閉通谷兮幽門肅步廊神封而靈墟存神藏彧中而俞府足手厥陰心包之絡中衝發中指之奇自勞宮大陵而往逐內關間使而馳叩郤門於曲澤酌天泉於天池手少陽三焦之脈在小指次指之端關衝聞乎液門中渚陽池外關支溝會宗三陽絡四瀆天井清冷淵消濼臑會肩髎相連天髎處天牖之下翳風讓瘈脈居先顱息定而角孫近耳絲竹空而和髎倒懸耳門既闢夏蚋聞焉足少陽兮膽經穴乃出乎竅陰溯俠溪兮地五會過臨泣兮丘墟平懸鐘兮陽輔光明外丘兮陽交陽陵西出陽關兮抵中瀆風市之境環跳居髎兮循維道五樞之宮考夫帶脈詢至京門日月麗兮輒筋榮淵腋泄兮肩井盈臨風池兮腦空鳴窮竅陰兮完骨明舉浮白於天衝接承靈於正營目窗兮臨泣陽白兮本神率谷回兮曲鬢出懸釐降兮懸顱承頷厭兮佳客主人聽會兮童子窖迎厥陰在足肝經所終起大敦於行間循太衝於中封蠡溝中都之會膝關曲泉之宮襲陰包於五里兮陰廉乃發尋羊矢於章門兮期門可攻至若任脈行乎腹與胸承漿泄兮廉泉通窺天突與璇璣搗華蓋於紫宮登玉堂兮膻中逢集中庭兮鳩尾沖瞻巨闕兮上脘中脘過建里兮下脘攸同水分兮神闕縹眇陰交兮氣海鴻濛石門直兮關元中極曲骨橫兮會陰乃終督脈行乎背部中兌端接兮齗交從素髎在鼻兮水溝疏通神庭入發兮上星朣朦囟會現兮前頂百會儼兮尊崇後頂轉兮強間逢腦戶閉兮風府空啞門通於大椎兮陶道坦夷身柱縹於神道兮靈臺穹窿至陽立下筋縮脊中接脊懸樞命門重重歌陽關兮舞腰俞願長強兮壽無窮十二經脈歌手太陰肺中焦生下絡大腸出賁門上膈屬肺從肺系系橫出腋臑中行肘臂寸口上魚際大指內側爪甲根支絡還從腕後出接次指屬陽明經此經多氣而少血是動則病喘與咳肺脹膨膨缺盆痛兩手交瞀為臂厥所生病者為氣咳喘喝煩心胸滿結臑臂之內前廉痛小便頻數掌中熱氣虛肩背痛而寒氣盛亦痛風汗出欠伸少氣不足息遺矢無度溺變別陽明之脈手大腸次指內側起商陽循指上廉出合谷兩筋歧骨循臂膀入肘外廉循臑外肩端前廉柱骨傍從肩下入缺盆內絡肺下膈屬大腸支從缺盆上入頸斜貫頰前下齒當還出人中交左右上俠鼻孔注迎香此經血盛氣亦盛是動頸腫並齒痛所生病者為鼽衄目黃口乾喉痹生大指次指難為用肩臑外側痛相仍氣有餘兮脈熱腫虛則寒栗病偏增胃足陽明交鼻起下循鼻外下入齒還出俠口繞承漿頤後大迎頰車裡耳前髮際至額顱支下人迎缺盆底下膈入胃絡脾宮直者缺盆下乳內一支幽門循腹中下行直合氣沖逢遂由髀關抵膝臏䯒跗中指內間同一支下膝注三里前出中指外間通一支別走足跗指大指之端經盡矣此經多氣復多血是動欠伸面顏黑悽悽惡寒畏見人忽聞木聲心振惕登高而歌棄衣走甚則腹脹仍賁響凡此諸疾皆骭厥所生病者為狂瘧濕溫汗出鼻流血口喎唇裂又喉痹膝臏疼痛腹脹結氣膺伏兔䯒外廉足跗中指俱痛徹有餘消穀溺色黃不足身前寒振栗胃房脹滿食不消氣盛身前皆有熱太陰脾起足大指上循內側白肉際核骨之後內踝前上腨循䯒脛膝里股內前廉入腹中屬脾絡胃與膈通俠喉連舌散舌下支絡從胃注心宮此經氣盛而血衰是動其病氣所為食入即吐胃脘痛更兼身體痛難移腹脹善噫舌本強得後與氣快然衰所生病者舌亦痛體重不食亦如之煩心心下仍急痛泄水溏瘕寒瘧隨不臥強立股膝腫疸發身黃大指痿手少陰脈起心中下膈直與小腸通支者還從肺系走直上咽喉系目瞳直者上肺出腋下臑後肘內少海從臂內後廉抵掌中兌骨之端注少衝多氣少血屬此經是動心脾痛難任渴欲飲水咽乾燥所生脅痛目如金臑臂之內後廉痛掌中有熱向經尋手太陽經小腸脈小指之端起少澤循手外廉出踝中循臂骨出肘內側上循臑外出後廉直過肩解繞肩甲交肩下入缺盆內向腋絡心循咽嗌下膈抵胃屬小腸一支缺盆貫頸頰至目鋭眥卻入耳復從耳前仍上頰抵鼻升至目內眥斜絡於顴別絡接此經少氣還多血是動則病痛咽嗌頷下腫兮不可顧肩如拔兮臑似折所生病兮主肩臑耳聾目黃腫腮頰肘臂之外後廉痛部分猶當細分別足經太陽膀胱脈目內眥上懸額尖支者巔上至耳角直者從巔腦後懸絡腦還出別下項仍循肩膊俠脊邊抵腰膂腎膀胱內一支下與後陰連貫臀斜入委中穴一支膊內左右別貫胛俠脊過髀樞髀外後廉膕中合下貫腨內外踝後京骨之下指外側是經血多氣少也是動頭痛不可當項如拔兮腰似折髀樞痛徹脊中央膕如結兮腨如裂是為踝厥筋乃傷所生瘧痔小指廢頭囟頂痛目色黃腰尻膕腳痛連背淚流鼻衄及癲狂足經腎脈屬少陰小指斜透湧泉心然骨之下內踝後別入跟中腨內侵出膕內廉上股內貫脊屬腎膀胱臨直者屬腎貫肝膈入肺循喉舌本尋支者從肺絡心內仍至胸中部分深此經多氣而少血是動病飢不欲食喘嗽唾血喉中鳴坐而欲起面如垢目視䀮䀮氣不足心懸如飢常惕惕所生病者為舌乾口熱咽痛氣賁逼股內後廉並脊疼心腸煩痛疸而澼痿厥嗜臥體怠惰足下熱痛皆腎厥手厥陰心主起胸屬包下膈三焦宮支者循胸出脅下脅下連腋三寸同仍上抵腋循臑內太陰少陰兩經中指透中衝支者別小指次指絡相通是經少氣原多血是動則病手心熱肘臂攣急腋下腫甚則胸脅支滿結心中淡淡或大動善笑目黃面赤色所生病者為心煩心痛掌熱病之則手經少陽三焦脈起自小指次指端兩指歧骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交別傳下入缺盆膻中分散絡心包膈里穿支者膻中缺盆上上項耳後耳角旋屈下至頤仍注頰一支出耳入耳前卻從上關交曲頰至目外眥乃盡焉斯經少血還多氣是動耳鳴喉腫痹所生病者汗自出耳後痛兼目鋭眥肩臑肘臂外皆痛小指次指亦如廢足脈少陽膽之經始從兩目鋭眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽後上缺盆支者耳後貫耳內出走耳前鋭眥循一支鋭眥大迎下合手少陽抵䪼根下加頰車缺盆合入胸貫膈絡肝經屬膽仍從脅裡過下入氣街毛際縈橫入髀厭環跳內直者缺盆下腋膺過季脅下髀厭內出膝外廉是陽陵外輔絶骨踝前過足跗小指次指分一支別從大指去三毛之際接肝經此經多氣乃少血是動口苦善太息心脅疼痛難轉移面塵足熱體無澤所生頭痛連鋭眥缺盆腫痛並兩腋馬刀俠癭生兩旁汗出振寒痎瘧疾胸脅髀膝至䯒骨絶骨踝痛及諸節厥陰足脈肝所終大指之端毛際叢足跗上廉太衝分踝前一寸入中封上踝交出太陰後循膕內廉陰股充環繞陰器抵小腹俠胃屬肝絡膽逢上貫膈里布脅肋俠喉頏顙目系同脈上巔會督脈出支者還生目系中下絡頰裡還唇內支者便從膈肺通是經血多氣少焉是動腰疼俯仰難男疝女人小腹腫面塵脫色及咽乾所生病者為胸滿嘔吐洞泄小便難或時遺溺並狐疝臨證還須仔細看十二經本一脈歌中焦肺起脈之宗出手大指之端沖大腸即起手次指上行環口交鼻里胃經源又下鼻交出足大指之端毛脾脈繼起指端上注於心中少陰向心經中之入掌循手內端出小指行小腸從手小指起上斜絡顴目內眥膀胱經從目內生至足小指外側行腎脈動於小指下起注胸中過腹胯心包出處又連胸循手小指次指中三焦起手次指側環走耳前目鋭息膽家接生目鋭傍走足大指三毛上足肝就起三毛際注入肺中循不已經穴起止歌手肺少商中府起大腸商陽迎香二足胃厲兌頭維三脾部隱白大包四手心少衝極泉來小腸少澤聽宮去膀胱睛明至陰間腎經湧泉俞府位心包中衝天池隨三焦關衝耳門繼膽家竅陰童子髎厥肝大敦期門已十二經穴始終歌學者銘於肺腑記十五脈絡歌人身絡脈一十五我今逐一從頭數手太陰絡為列缺手少陰絡即通里手厥陰絡名內關手太陽絡支正是手陽明絡偏歷當手少陽絡外關位足太陽絡號飛揚足陽明絡豐隆系足少陽絡是光明足太陰絡公孫寄足少陰絡為大鐘足厥陰絡蠡溝配陽督之絡號長強陰任之絡為屏翳脾之大絡大包是十五絡穴君須記經脈氣血多少歌多氣多血經須記大腸手經足經胃少血多氣有六經三焦膽腎心脾肺多血少氣心包絡膀胱小腸肝所異禁針穴歌禁針穴道要先明腦戶囟會及神庭絡卻玉枕角孫穴顱囟承泣隨承靈神道靈臺膻中忌水分神闕並會陰橫骨氣衝手五里箕門承筋及青靈更加臂上三陽絡二十二穴不可針孕婦不宜針合谷三陰交內亦通倫石門針灸應須知女子終身無妊娠外有云門並鳩尾缺盆客主人莫深肩井深時人悶倒三里急補人還平禁灸穴歌禁灸之穴四十五承光啞門及風府天柱素髎臨泣上睛明攢竹迎香數禾髎顴髎絲竹空頭維下關與脊中肩貞心俞白環俞天牖人迎共乳中周榮淵腋並鳩尾腹哀少商魚際位經渠天府及中衝陽關陽池地五會隱白漏谷陰陵泉條口犢鼻還陰市伏兔髀關委中穴殷門申脈承扶忌血忌歌行針須要明血忌正醜二寅三之未四申五卯六酉宮七辰八戌九居已十亥十一午正當臘子更加逢日閉逐日人神歌初一十一草一起足拇鼻柱手小指初二十二草二日外踝髮際外踝位初三十三二十三股內牙齒足及肝初四十四草四右腰間胃脘陽明手初五十五草五並口內遍身足陽明初六十六草六同手掌胸前又在胸初七十七二十七內踝氣衝及在膝初八十八草八辰腕內股內又在陰初九十九二十九在尻在膝足脛後初十二十三十日腰背內踝足跣覓九宮尻神歌尻神所在足根由坤內外踝聖人留震宮牙臑分明記巽位還居乳口頭中宮肩骨連尻骨面目背從幹上遊手膊兌宮難砭灸艮宮腰項也須休離宮膝肋針難下坎肘還連肚脈求為醫精曉尻神法萬病無干禁忌憂此乃神農所制一歲起坤二歲震逐年順飛九宮周而復始行年到處則所生敗體切忌針灸若誤犯之重則喪命輕則發癰疽之疾也太乙人神歌立春艮上起天留戊寅己丑左足求春分左脅倉門震乙卯日見定為仇立夏戊辰己巳巽陰絡宮中左手愁夏至上天丙辰日正直應喉離首頭立秋玄委宮右手戊申己未坤上遊秋分倉果西方兌辛酉還從右脅謀立冬左足加新洛戊戌己亥乾位收冬至坎方臨葉蟄壬子腰尻下竅流五臟六腑並臍腹招搖戊己在中州潰治癰疽當須避犯其天忌疾難瘳孫思邈先生針十三鬼穴歌百邪顛狂所為病針有十三穴須認凡針之體先鬼宮次針鬼信無不應一一從頭逐一求男從左起女從右一針人中鬼宮停左邊下針右出針第二手大指甲下名鬼信刺三分深三針足大指甲下名曰鬼壘入二分四針掌後大陵穴入寸五分為鬼心五針申脈名鬼路火針三下七鋥鋥第六卻尋大杼上入發一寸名鬼枕七刺耳垂下五分名曰鬼床針要溫八針承漿名鬼市從左出右君須記九針間使鬼市上十針上星名鬼堂十一陰下縫三壯女玉門頭為鬼藏十二曲池名鬼臣火針仍要七鋥鋥十三舌頭當舌中此穴須名是鬼封手足兩邊相對刺若逢孤穴只單通此是先師真口訣狂猖惡鬼走無蹤長桑君天星祕訣歌天星祕訣少人知此法專分前後施若是胃中停宿食後尋三里起璇璣脾病血氣先合谷後刺三陰交莫遲如中鬼邪先間使手臂攣痹取肩髃腳若轉筋並眼花先針承山次內踝腳氣痠疼肩井先次尋三里陽陵泉如是小腸連臍痛先刺陰陵後湧泉耳鳴腰痛先五會次針耳門三里內小腸氣痛先長強後刺大敦不要忙足緩難行先絶骨次尋條口及衝陽牙疼頭痛兼喉痹先刺二間後三里胸膈痞滿先陰交針到承山飲食喜肚腹浮腫脹膨膨先針水分瀉建里傷寒過經不出汗期門三里先後看寒瘧面腫及腸鳴先取合谷後內庭冷風濕痹針何處先取環跳次陽陵指痛攣急少商好依法施之無不靈此是桑君真口訣時常莫作等間輕馬丹陽天星十二穴並治雜病歌三里內庭穴曲池合谷接委中配承山太衝崑崙穴環跳與陽陵通里並列缺合擔用法擔合截用法截三百六十穴不出十二訣治病如神靈渾如湯澆雪北斗降真機金鎖教開徹至人可傳受匪人莫浪説三里足膝下三寸兩筋間能除心腹痛善治胃中寒腸鳴並泄瀉腫滿腳脛痠傷寒羸瘦損氣蠱疾諸般人過三旬後針灸眼重觀取穴舉足取去病不為難內庭足指內胃脘屬陽明善療四肢厥喜靜惡聞聲耳內鳴喉痛數欠及牙疼瘧疾不思食針後便惺惺曲池曲肘里曲骨陷中求能治肘中痛偏風半不收彎弓開不得臂瘓怎梳頭喉閉促欲死發熱更無休遍身風疙瘩針後即時瘳合谷在虎口兩指岐骨間頭疼並面腫瘧疾熱又寒體熱身汗出目暗視朦朧牙疼並鼻衄口禁更難言針入看深淺令人病自安委中曲膕里動脈正中央腰重不能舉沉沉俠脊梁風癇及筋轉熱病不能當膝頭難伸屈針入即安康承山在魚腰腨腸分肉間善理腰疼痛痔疾大便難腳氣足下腫兩足盡寒酸霍亂轉筋急穴中刺便安太衝足大指節後三寸中動脈知生死能除驚癇風咽喉腫心脹兩足不能動七疝偏墜腫眼目似云朦亦能療腰痛針下有神功崑崙足外踝後跟微脈尋膊重腰尻痛陽踝更連陰頭疼脊背急暴喘滿中心踏地行不得動足即呻吟若欲求安好須尋此穴針環跳在足髀側臥下足舒上足屈乃得針能廢毒軀冷風並冷髀身體似纏拘腿重腨痛甚屈伸轉側噓有病須針灸此穴最蘇危陽陵泉膝下外廉一寸中膝腫並麻木起坐腰背重面腫胸中滿冷痹與偏風努力坐不得起臥似衰翁針入五分後神功實不同通里腕側後掌後一寸中欲言言不出懊憹在心中實則四肢重頭腮面頰紅平聲仍欠數喉閉氣難通虛則不能食咳嗽面無容毫針微微刺方信有神功列缺腕側上鹽指手交叉專療偏頭患偏風肘木麻痰涎頻壅上口噤不開牙若能明補瀉應手疾如拿四總穴歌肚腹三里留腰背委中求頭項尋列缺面口合谷收千金十一穴歌三里內庭穴肚腹中妙訣曲池與合谷頭面病可徹腰背痛相連委中崑崙穴胸項如有痛後溪並列缺環跳與陽陵膝前兼腋脅可補即留久當瀉即疏泄三百六十名十一千金穴治病十一證歌攢竹絲竹主頭疼偏正皆宜向此針更去大都除瀉動風池又刺三分深曲池合谷先針瀉永與除疴病不侵依此下針無不應管教隨手便安寧頭風頭痛與牙疼合谷三間兩穴尋更向大都針眼痛太淵穴內用行針牙痛三分針呂細齒疼依前指上明更推大都左之右交互相迎仔細尋聽會兼之與聽宮七分針瀉耳中聾耳門又瀉三分許更加七壯灸聽宮大腸經內將針瀉曲池合谷七分中醫者若能明此理針下之時便見功肩背並和肩膊疼曲池合谷七分深未愈尺澤加一寸更於三間次第行各入七分於穴內少風二府刺心經穴內淺深依法用當時蠲疾兩三經咽喉以下至於臍胃脘之中百病危心氣痛時胸結硬傷寒嘔噦悶涎隨列缺下針三分許三分針瀉到風池二手三間並三里中衝還刺五分依汗出難來刺腕骨五分針瀉要君知魚際經渠並通里一分針瀉汗淋漓手指三間及三里大指各刺五分宜汗至如若通遍體有人明此是醫師四肢無力中邪風眼澀難開百病攻精神昏倦多不語風池合谷用針通兩手三間隨後瀉三里兼之與太衝各入五分於穴內迎隨得法有神功風池手足指諸間右瘓偏風左曰癱各刺五分隨後瀉更灸七壯便身安三里陰交行氣瀉一寸三分量病看每穴又加三七壯自然癱瘓即時安瘧疾將針刺曲池經渠合谷共相宜五分針刺於二穴瘧病纏身方得離未愈更加三間刺五分深刺莫憂疑又兼氣痛增寒熱間使行針莫用遲腿膝腰疼痞氣攻髖骨穴內七分窮更針風市兼三里一寸三分補瀉同又去陰交瀉一寸行間仍刺五分中剛柔進退隨呼吸去疾除疴捻指功肘膝疼時刺曲池進針一寸是便宜左病針右右針左依此三分瀉氣奇膝痛三分針犢鼻三里陰交要七次但能仔細尋其理劫病之功在片時流注指微賦疾居榮衛扶救者針觀虛實於瘦肥辨四時之淺深是見取穴之法但分陰陽而溪谷迎風逆順須曉氣血而升沉原夫指微論中頤義成賦知本時之氣開説經絡之流注每披文而參其法篇篇之旨審存覆經而察其言字字之功明諭疑隱皆知虛實總附移痛住疼如有神針下獲安暴疾沉疴至危篤刺之勿誤詳夫陰日血引值陽氣流口溫針陽日氣引逢陰血暖牢寒濡深求諸經十二作數絡脈十五為周陰俞六十臟主陽穴七十腑收刺陽經者可臥針而取奪血絡者先俾指而柔呼為迎而吸作補逆為鬼而從何憂淹疾延患著灸之由躁煩藥餌而難極必取八會癰腫奇經而蓄邪纖猶砭瘳況夫甲膽乙肝丁心壬水生我者號母我生者名子春井夏滎乃邪在秋經冬合乃刺矣犯禁忌而病復用日衰而難已孫絡在於肉分血行出於支里悶昏針暈經虛補絡須然痛實癢虛瀉子隨母要指想夫先賢迅效無出於針今人愈疾豈離於醫徐文伯瀉孕於苑內斯由甚速範九思療咽於江夏聞見言稀大抵古今遺迹後世皆師王纂針昧而立康獺從被出秋夫療鬼而馘效魂免傷悲慨而感指幽微用針真訣竅齊於筋骨皮肉刺要痛察於久新臟腑寒熱接氣通經短長依法裡外之絶羸盈必別勿刺大勞使人氣亂而神隳慎妄呼吸防他針昏而閉血又以常尋古義由有藏機遇高賢真趣則超然得悟逢達人示教則表我秩危男女氣脈行分時合度養時刻注穴穴須依今詳定疾病之儀神針法式廣搜難素之祕密文辭深考諸家之肘亟妙臆故稱瀘江流注之指微以為後學之規則通玄指要賦必欲治病莫如用針巧運神機之妙功開聖理之深外取砭針能蠲邪而輔正中含水火善回陽而倒陰原夫絡別支殊經交錯綜或溝渠溪谷以岐異或山海丘陵而隙共斯流派以難暌在條綱而有統理繁而昧縱補瀉有何功法捷而明曰迎隨而得用且如行步難移太衝最奇人中除脊膂之強痛神門去心性之呆癡傷風項急始求於風府頭暈目眩要覓於風池耳閉須聽會而治也眼痛則合谷以推之胸結身黃瀉湧泉而即可腦昏目赤瀉攢竹以便宜若兩肘之拘攣仗曲池而平掃牙齒痛呂細堪治頭項強承漿可保太白宣導於氣衝陰陵開通於水道腹膨而脹奪內庭以休遲筋轉而疼瀉承山而在早大抵腳腕痛崑崙解圍股膝疼陰市能醫癇發顛狂兮憑後溪而療理瘧生寒熱兮仗間使以扶持期門罷胸滿血膨而可已勞宮退胃翻心痛以何疑嵇夫大敦去七疝之偏墜王公謂此三里去五勞之羸瘦華他言斯固知腕骨祛黃然谷瀉腎行間治膝腫目疾尺澤去肘疼筋緊目昏不見二間宜取鼻塞無聞迎香可引肩井除兩臂之難任攢竹療頭疼之不忍咳嗽寒痰列缺堪治眵昏冷淚臨泣尤準髖骨並腿痛以祛殘腎俞腰痛而瀉泄以見越人治尸厥於維會隨手而蘇文伯能瀉死胎於陰交應針而殞聖人於是察麻與痛分實與虛實則自外而入也虛則自內而出之是故濟母而裨其不足奪子而平其有餘觀二十七之經絡一一明辨據四百四之病證件件皆除故得夭枉都無躋斯民於壽域機微已判彰往古之玄盡抑又聞心胸病求掌後之大陵肩背疼責肘前之三里冷痹腎余取定陽陰之上連臍腹疼瀉足少陰之水脊間心後者針中渚而立痊脅下肋邊者刺陽陵而即止頭強痛擬後溪以安然腰背疼在委中而已矣夫用針之士於此理苟明者焉收祛邪之功而在乎捻指靈光賦黃帝岐伯針灸訣依他經里分明説三陰三陽十二經更有兩經分八脈靈光典注極幽深偏正頭疼瀉列缺睛明治眼胬肉扳耳聾氣痞聽會間兩鼻螉衄針禾窖鼻窒不聞迎香間治氣上壅足三里天突宛中治喘痰心痛手顫針少海少澤應除心下寒兩足拘攣覓陰市五般腰痛委中安脾俞不動瀉丘墟復溜治腫如神醫犢鼻治療風邪疼住喘腳痛崑崙愈後跟痛在僕參求承山筋轉並九痔足掌下去尋湧泉此法千金莫妄傳此穴多治婦人疾男蠱女孕兩病痊百會鳩尾治痢疾大小腸俞大小便氣海血海療五淋中脘下脘治腹堅傷寒過經期門應氣刺兩乳求太淵大敦二穴主偏墜水溝間使治邪顛吐而定喘補尺澤地倉能止口流涎勞宮醫得身勞倦水腫水分灸即安五指不伸中渚取頰車可針牙齒愈陰蹺陽蹺兩踝邊腳氣四穴先尋取陰陽陵泉亦主之陰蹺陽蹺與三里諸穴一般治腳氣在腰玄機宜正取膏肓豈止治百病灸得玄切病須愈針灸一穴數病除學者尤宜加仔細悟得明師流注法頭目有病針四肢針有補瀉明呼吸穴應五行順四時悟得人身終造化此歌依舊是筌諦席弘賦凡欲行針須審穴要明補瀉迎隨訣胸背左右不相同呼吸陰陽男女別氣刺兩乳求太淵未應之時瀉列缺列缺頭疼及偏正重瀉太淵無不應耳聾氣痞聽會針迎香穴瀉功如神誰知天突治喉風虛喘須尋三里中手連肩脊痛難忍合谷針時要太衝曲池兩手不如意合谷下針宜子細心疼手顫少海間若要除根覓陰市但患傷寒兩耳聾金門聽會疾如風五般肘痛尋尺澤太淵針後卻收功手足上下針三里食癖氣塊憑此取鳩尾能治五般癇若下湧泉人不死胃中有積刺璇璣三里功多人不知陰陵泉治心胸滿針到承山飲食思大杼若連長強尋氣滯腰疼不能立橫骨大都宜急救氣海專能治五淋更針三里隨呼吸期門穴主傷寒患六日過經猶未汗但向乳根二肋間又治婦人生産難耳內蟬鳴腰欲折膝下明存三里穴若能補瀉五會間且莫逢人容易説睛明治眼未效時合谷光明安可缺人中治癇功最高十三鬼穴不須饒水腫水分兼氣海皮肉隨針氣自消冷嗽先宜補合谷卻須針瀉三陰交牙齒腫痛並咽痹二間陽溪疾怎逃更有三間腎俞妙善除肩背消風勞若針肩井須三里不刺之時氣未調最是陽陵泉一穴膝間疼痛用針燒委中腰痛腳攣急取得其經血自調腳疼膝腫針三里懸鐘二陵三陰交更向太衝須引氣指頭麻木自輕飄轉筋目眩針魚腹承山崑崙立便消肚疼須是公孫妙內關相應必然瘳冷風冷痹疾難愈環跳腰間針與燒風府風池尋得到傷寒百病一時消陽明二日尋風府嘔吐還須上脘療婦人心痛心俞穴男子痃疼三里高小便不禁關元好大便閉澀大敦燒髖骨腿疼三里瀉復溜氣滯便離腰從來風府最難針卻用功夫度淺深倘若膀胱氣未散更宜三里穴中尋若是七疝小腸痛照海陰交曲泉針又是應時求氣海關元同瀉效如神小腸氣撮痛連臍速瀉陰交莫得遲良久湧泉針取氣此中玄妙少人知小兒脫肛患多時先灸百會次鳩尾久患傷寒肩背痛但針中渚得其宜肩上痛連臍不休手中三里便須求下針麻重即須瀉得氣之時不用留腰連胯痛急必大便於三里攻其隘下針一瀉三補之氣上攻噎只管在噎不住時氣海灸定瀉一時立便瘥補自卯南轉針高瀉從卯北莫辭勞逼針瀉氣便須吸若補隨呼氣自調左右捻針尋子午抽針瀉氣自迢迢用針補瀉分明説更用搜窮本與標咽喉最急先百會太衝照海及陰交學者潛心宜熟讀席弘治病最名高
