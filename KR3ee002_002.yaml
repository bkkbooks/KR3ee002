body:
  text: 卷之二標幽賦拯救之法妙用者針夫今人愈疾豈離於醫治劫病之功莫妙於針刺故經云拘於鬼神者不可與言至德惡於針石者不可與言至巧正此之謂察歲時於天道夫人身十二經三百六十節以應一歲十二月三百六十日歲時者春暖夏熱秋涼冬寒此四時之正氣苟或春應暖而反寒夏應熱而反涼秋應涼而反熱冬應寒而反暖是故冬傷於寒春必溫病春傷於風夏必飧泄夏傷於暑秋必痎瘧秋傷於濕上逆而咳岐伯曰凡刺之法必候日月星辰四時八正之氣氣定乃刺焉是故天溫月明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝滯而衛氣沉月始生則氣血始精衛氣始行月廓滿則氣血實肌肉生月廓空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也天寒無刺天溫無疑月生無瀉月滿無補月廓空無治是謂得天時而調之若日月生而瀉是謂臟虛月滿而補血氣揚溢絡有留血名曰重實月廓空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起又曰天有五運金水木火土也地有六氣風寒暑濕燥熱也學者必察斯焉定形氣於豫心經云凡用針者必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脈而後調之無問其病而平調理期細察形氣得於心矣形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生不調者病相失者死是故色脈不順而莫針戒之戒之春夏瘦而刺淺秋冬肥而刺深經云病有沉浮刺有淺深各至其理無過其道過之則內傷不及則外壅外壅則邪從之淺深不得反為大賊內傷五臟後生大病故曰春病在毫毛腠理夏病在皮膚故春夏之人陽氣輕浮肌肉瘦薄血氣未盛宜刺之淺秋病在肌肉血脈冬病在筋骨秋冬則陽氣收藏肌肉肥厚血氣充滿刺之宜深又云春刺十二井夏刺十二滎季夏刺十二俞秋刺十二經冬刺十二合以配木火土金水理見子午流注不窮經絡陰陽須逢禁刺經有十二手太陰肺少陰心厥陰心包絡太陽小腸少陽三焦陽明大腸足太陰脾少陰腎厥陰肝太陽膀胱少陽膽陽明胃也絡有十五肺絡列缺心絡通里心包絡內關小腸絡支正三焦絡外關大腸絡偏歷脾絡公孫腎絡大鐘肝絡蠡溝膀胱絡飛揚膽絡光明胃絡豐隆陰蹺絡照海陽蹺絡申脈脾之大絡大包督脈絡長強任脈絡屏翳也陰陽者天之陰陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之夫言人之陰陽則外為陽內為陰言身之陰陽則背為陽腹為陰手足皆以赤白肉分之言臟腑之陰陽則五臟為陰六腑為陽是以春夏之病在陽秋冬之病在陰皆視其所在與施針石也又言背為陽陽中之陽心也陽中之陰肺也腹為陰陰中之陰腎也陰中之陽肝也陰中之至陰脾也此皆陰陽表裡內外雌雄相輸應也是以應天之陰陽學者苟不明此經絡陰陽升降左右不同之理如病在陽明反攻厥陰病在太陽反和太陰遂致賊邪未除本氣受弊則有勞無功禁刺之犯豈可免哉既論臟腑虛實須向經尋臟者心肝脾肺腎也腑者膽胃大小腸三焦膀胱也虛者癢麻也實者腫痛也臟腑居在內經絡行乎外虛則補其母實則瀉其子如心病虛則補肝木實則瀉脾土又且本經亦有子母如心之虛取少海穴以補之實則取少府穴以瀉之諸經皆然並不離乎五行相生之理矣原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後此言平人氣象氣脈行於十二經一周為身除任督之外計三百九十三穴一日一夜有百刻分為十二時每一時有八刻二分每一刻計六十分一時共計五百分每日寅時太陰肺脈生自中焦中府穴出於雲門起至少商穴止卯時陽明大腸經自商陽穴至迎香穴辰時陽明胃經自頭維至厲兌巳時太陰脾經自隱白至大包午時少陰心經自極泉至少衝未時太陽小腸經自少澤至聽宮申時太陽膀胱經自睛明至至陰酉時少陰腎經自湧泉至俞府戌時心包絡自天池至中衝亥時少陽三焦經自關衝至禾髎子時少陽膽經自童子髎至竅陰丑時厥陰肝經自大敦至期門而終經有十二別絡走三百餘支十二經者即手足三陰三陽之正經也別絡者除十五絡又有橫絡絲絡孫絡不知其紀散走於三百餘支之脈也正側偃伏氣血有六百餘候此言經絡或正或側或仰或覆而氣血循行孔穴一周於身榮行脈中三百餘候衛行脈外三百餘候手足三陽手走頭而頭走足手足三陰足走腹而胸走手此言經絡陰升陽降氣血出入之機男女無以異矣要識迎隨須明順逆迎隨者要和榮衛之流注經脈之往來也明其陰陽之經逆順而取之迎者以針頭朝其源而逆之隨者以針頭從其流而順之是故逆之為瀉為迎順之為補為隨若能知迎知隨令氣必和和氣之方必通陰陽升降上下源流往來逆順之道明矣況夫陰陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位此言三陰三陽氣血多少之不同取之必記為最要也先詳多少之宜次察應至之氣言用針者先明正文氣血之多少次觀針氣之來應也輕滑慢而未來沉澀緊而已至輕浮滑虛慢遲也入針之後值此三者乃真氣之未到也沉重澀滯緊實也入針之後值此三者是正氣之已到也既至也量寒熱而留疾留住也疾速也此言正氣既至必審寒熱而施之故經云刺熱須至寒者必留針陰氣隆至乃呼之去徐其穴不捫刺寒須至熱者陽氣隆至針氣必熱乃吸之去疾其穴急捫未至也據虛實而痏氣此言針氣之未來也經云虛則推內進搓以補其氣實則循捫彈怒以引其氣氣之至如魚吞釣餌之浮沉氣未至如閉處幽堂之深邃邃氣既至則針自澀緊似魚吞釣或沉或浮而動其氣不來針自輕滑如閉居靜室之中寂然無所聞也氣至速而效速氣遲至而不治言下針若得氣來速則病易痊而效亦速也氣若來遲則病難愈而有不治之憂故賦云氣速效速氣遲效遲候之不至必死無疑矣觀夫九針之法毫針最微七星可應衆穴主持昔黃帝制九針者上應天地下應陰陽四時九針之名各不同形一曰鑱針以應天長一寸六分頭尖末鋭去瀉陽氣二曰員針以應地長一寸六分針如卵形楷磨分肉間不得傷肌肉以瀉分氣三曰匙針以應人長三寸半鋒如黍粟之鋭主脈如陷以致其氣四曰鋒針以應四時長一寸六分刃三隅以發痼疾五曰鈹針以應五音長四寸廣二分半末如劍鋒以取大膿六曰員利針以應六律長一寸六分尖如氂且員且鋭中身微大以取暴氣七曰毫針以應七星長三寸六分尖如蚊虻喙靜以徐往微以久留之而癢以取痛痹八曰長針以應八風長七寸鋒利身薄可以取遠痹九曰大針以應九野長四寸其鋒微員尖如挺以瀉機關之水九針畢矣此言九針之妙毫針最精能應七星又為三百六十穴之備也本形金也有蠲邪扶正之道本形言針也針本出於金古人以砭石今人以針代之蠲除也邪氣盛針能除之扶輔也正氣衰針能輔也短長水也有決凝開滯之機此言針有長短猶水之長短也人之氣血凝滯而不通猶水之凝滯而不通也水之不通決之使流於湖海氣血不通針之使周於經絡故言針應水也定刺象木或斜或正此言木有斜正而用針亦有或斜或正之不同刺陽經者必斜臥其針無傷其衛刺陰分者必正立其針毋傷其榮故言針應木也口藏比火進陽補羸口藏以針含於口也氣之溫如火之溫也羸瘦也凡欲下針之時必效仿真人口溫針暖使榮衛相接進己之陽氣補彼之瘦弱故言針應火也循機捫而可塞以象土循者用手上下循之使氣血往來也機捫者針畢以手捫閉其穴如用土填塞之義故言針應土也實應五行而可知五行者金水木火土也此結上文針能應五行之理可知矣然是一寸六分包含妙理言針雖但長一寸六分能巧運神機之妙中含水火回倒陰陽其理最玄妙也或細楨於毫髮同貫多岐楨針之干也岐氣血往來之路也言針之干雖如毫髮之微小能貫通諸經血氣之道路也可平五臟之寒熱能調六腑之虛實平治也調理也言針能調治臟腑之疾有寒則溫之有熱則清之虛則補之實則瀉之拘攣閉塞遣八邪而去矣拘攣者筋脈之拘束也閉塞者氣血不通也八邪者所以候八風之虛邪也言疾有攣閉者必驅散八風之邪也寒熱痛痹開四關而已之寒者身作顫而發寒也熱者身作潮而發熱也痛疼痛也痹麻木也四關者五臟有六腑六腑有十二原十二原出於四關太衝合谷是也凡刺者使本神朝而後入即刺也使本神定而氣隨神不朝而勿刺神已定而可施凡用針者必使患者精神已朝而後方可入針既刺之必使患者精神才定而後施針行氣若氣不朝其針為輕滑不知疼痛如插豆腐者莫與進之必死之候如神氣既至針自緊澀可與依法察虛實而施之定腳處取氣血為主意言欲下針之時必取陰陽氣血多少為主詳見上文下手處認水木是根基下手亦言用針也水者母也木者子也是水能生木也是故濟母裨其不足奪子平其有餘此言用針必先認子母相生之義舉水木而不及土金火者省文也天地人三才也湧泉同璇璣百會百會一穴在頭以應乎天璇璣一穴在胸以應乎人湧泉二穴在足掌心以應乎地是謂三才也上中下三部也大包與天樞地機大包二穴在乳後為上部天樞二穴在臍傍為中部地機二穴在足䯒為下部是謂三部也陽蹺陽維並督脈主肩背腰腿在表之病陽蹺脈起於足跟中循外踝上入風池陽維脈維持諸陽之會如腑會太倉之類督脈起自下極之腧並與脊裡上行風府過腦額鼻入齦交也言此奇經三脈屬陽主治肩背腰腿在表之疾也陰蹺陰維任沖帶去心腹脅肋在裡之凝陰蹺脈亦起於足跟循內踝上行至咽喉交貫衝脈陰維脈維持諸陰之交如足太陰之脈交出厥陰之前任脈起於中極之下循腹上至咽喉而終衝脈起於氣衝並足少陰之經夾臍上行至胸中而散也帶脈起於季脅回身一周如繫帶也言此奇經五脈屬陰能治心腹脅肋在裡之疾也二陵二蹺二交似續而交五大二陵者陰陵陽陵也二蹺者陰蹺陽蹺也二交者陰交陽交也續接續也五大者五體也言此六穴遞相交接於兩手兩足並頭也兩間兩商兩井相依而列兩支兩間者二間三間也兩商者少商商陽也兩井者天井肩井也言此六穴相依而分別於手之兩支也另見取穴之法必有分寸先審自意次觀肉分此言取量穴法必以男左女右中指與大指相屈如環取內側紋兩角為一寸各隨長短大小取之此乃同身之寸先審病者是何病屬何經用何穴審於我意次察病者瘦肥長短大小肉分骨節髮際之間量度以取之或伸屈而得之或平直而安定伸屈者如取環跳之穴必須伸下足屈上足以取之乃得其穴平直者或平臥而取之或正坐而取之或直立而取之自然安定如承漿在唇下宛宛中之類也在陽部筋骨之側陷下為真在陰分郤膕之間動脈相應陽部者諸陽之經也如合谷三里陽陵泉等穴必取俠骨側指陷中為真也陰分者諸陰之經也如箕門五里太衝等穴在屈心之間必以動脈應指乃為真穴也取五穴用一穴而必端取三經用一經而可正此言取穴之法必須點取五穴之中而用一穴則可為端的矣若用一經必須取三經而正一經之是非也頭部與肩部詳分督脈與任脈易定頭部與肩部則穴繁多但醫者以自意詳審大小肥瘦而分之督任二脈值乎背腹中行而有分寸則易定也明標與本論刺深刺淺之經標本者非止一端也有六經之標本有天地陰陽之標本有傳病之標本夫六經之標本者足太陽之本在足跟上五寸標在目也足少陽之本在竅陰標在耳也足陽明之本在厲兌標在人迎頰挾頏顙也足太陰之本在中封前上四寸標在背脾俞與舌本也足少陰之本在內踝上三寸中標在背腎俞與舌下兩脈也足厥陰之本在行間上五寸中所標在背肝俞也手太陽之本在手外踝後標在命門之上一寸也手少陽之本在小指次指之間上一寸標在耳後上角下外眥也手陽明之本在肘骨中上別陽標在額下合鉗上也手太陰之本在寸口之中標在腋內動脈也手少陰之本在鋭骨之端標在背心俞也手厥陰之本在掌後兩筋之間二寸中標在筋下三寸也此乃十二之行取也經云病有標本刺有逆從淺深之理凡刺之方必別陰陽前後相應逆從得施標本相移故曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者故知逆從正行無間明知標本者萬舉萬當不知標本者是謂妄行夫陰陽標本逆從之道也小而言大一而知百病之害少而多淺而博可以言一而知百也以淺而知深察近而知遠標本易言而世人識見無能及也治反為逆治得為從先病而後逆者先逆而後病者先病而後生寒者先熱而後生病者此五者俱治其本也先熱而後中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後中滿者治其標先中滿而後煩心者治其本大小便不利治其標大小便利治其本大小便不利而生病者治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本又云得病日為本傳病為標也淺深者刺陽經必中榮須淺而臥針無傷於衛也刺陰分中衛須深而立針無損於榮也此謂陰陽標本淺深之道也住痛移疼取相交相貫之經此言用針之法有住痛移疼之功者必先以針左行左轉而得九數復以右行右轉而得六數此乃陰陽交貫之道也經脈亦有交貫如太陰肺之列缺交於陽明大腸之路陽明胃之豐隆別走於太陰脾經此之類也豈不聞臟腑病而求門海俞募之類門海者如章門氣海之類俞者五臟六腑之俞也俱在背部二行中募者臟腑之募肺募中府心募巨闕胃募中脘肝募期門膽募日月脾募章門腎募京門大腸募天樞小腸募關元但三焦包絡膀胱無募矣此言五臟六腑之有病必取此門海俞募之穴而刺之最微妙矣經絡滯而求原別交會之道原者十二經之原也別陽別也交陰交也會八會也夫十二原者膽原丘墟肝原太衝小腸原腕骨心原神門胃原衝陽脾原太白大腸原合谷肺原太淵膀胱原京骨腎原太溪三焦原陽池包絡原大陵八會者血會膈俞氣會膻中脈會太淵筋會陽陵泉骨會大杼髓會絶骨臟會章門腑會中脘也此言經絡血氣凝結不通者必取此原別交會之穴而刺之更窮四根三結依標本而刺無不痊根結者十二經之根結也靈樞經云足太陰根於隱白結於太倉也足少陰根於湧泉結於廉泉也足厥陰根於大敦結於玉堂也足太陽根於至陰結於目也足陽明根於厲兌結於鉗耳也少陽根於竅陰結於耳也手太陽根於少澤結於天窗支正也手少陽根於關衝結於天牖外關也手陽明根於商陽結於扶突偏歷也手三陰之經未載不敢強注又云四根者耳根鼻根乳根腳根也三結者胸結腹結便結也此言能究根結之理依上文標本之法刺之則疾無不愈也但用八法五門分主客而刺無不效八法者奇經八脈也公孫衝脈胃心胸內關陰維下總同臨泣膽經連帶脈陽維目鋭外關逢後溪督脈內眥頸申脈陽蹺絡亦通列缺肺任行肺系陰蹺照海膈喉嚨五門者天干配合分於五也甲與己合乙與庚合丙與辛合丁與壬合戊與癸合也主客者公孫主內關客也臨泣主外關客也後溪主申脈客也列缺主照海客也此言用八法必以五門推時取穴先主後客而無不效也詳載於後八脈始終連八會本是紀綱八脈者即奇經也注見上文八會者氣血脈筋骨髓臟腑之會也亦注見前紀綱者如綱之有綱也此言奇經八脈起止連及八會本是人身經脈之綱領也十二經絡十二原是一樞要十二經十五絡十二原穴俱注見前此言十二原者乃十二經絡出入門戶之樞紐也一日取六十六穴之法方見幽微六十六穴者即子午流注井滎俞原經合也陽干注腑三十六穴陰乾注臟三十穴共成六十六穴俱載於後子午流注圖中此言經絡一日一周於身歷行十二經穴當此之時酌取流注之中一穴用之則幽微之理可見矣一時取一十二經之原始知要妙十二經原注見於前此言一時之中當審此日是何經所主當此之時該取本日此經之原穴而刺之則流注之法玄妙始可知矣原夫補瀉之法非呼吸而在手指此言補瀉之法非但呼吸而在乎手指之法也法分十四者循捫提按彈捻搓盤推內動搖爪切進退出攝者是也法則如斯巧拙在人之活法備詳金針賦內速效之功要交正而識本經交正者如大腸與肺為傳送之府心與小腸為受盛之官脾與胃為消化之官肝與膽為清淨之位膀胱合腎為津液之官陰陽相通表裡相應也本經者受病之經如心之病必取小腸之穴兼之余仿此言能識本經之病又要認交經正經之理則針之功必速矣交經繆刺左有病而右畔取繆刺者刺絡脈也右痛而刺左左痛而刺右此乃交經繆刺之理也瀉絡遠針頭有病而腳上針三陽之經從頭下足故言頭有病必取足穴而刺之巨刺與繆刺各異巨刺者刺經脈也痛在左而右脈病者則巨刺之左痛刺右右痛刺左中其經也繆刺者刺絡脈也身形有痛九候無病則繆刺之右痛刺左左痛刺右中其絡也經云左盛則右病右盛則左病亦有移易者右痛未已而左脈先病如此者必巨刺之中其經非絡脈也故絡病其經與經脈繆處故曰繆刺此刺法之相同但一中經一中絡之異耳微針與妙刺相通微針者刺之巧也妙刺者針之妙也言二者之相通觀部分而知經絡之虛實言針入肉分則以天人地三部而進必察其得氣則內外虛實而可知矣又云察脈之三部則知何經虛何經實也視沉浮而辨臟腑之寒溫言下針之後看針氣緩急可決臟腑之寒熱也且夫先令針耀而慮針損次藏口內而欲針溫言欲下針之時必先令針光耀看針莫有損壞次將針含於口內令針溫暖與榮衛相接無相觸犯也目無外視手如握虎心無內慕如待貴人此戒用針之士貴乎專心誠意而自重也令目無他視手如握虎恐有傷也心無他想如待貴人恐有責也經云凡刺之道必觀其部心無別慕手如擒虎猶待貴人不知日暮著意留心不失其所此之謂也左手重而多按欲令氣散右手輕而徐入不痛之因言欲下針之時必先以左手大指爪甲於穴上切之則令其氣散以右手持針輕輕徐入此乃不痛之因也空心恐怯直立側而多暈空心者未食之前此言無刺飢人其氣血未定則令人恐懼有怕怯之心或直立或側臥必有眩暈之咎也背目沉掐坐臥平而少昏此言欲下針之時必令患人勿視所針之處以手爪甲重切其穴或臥或坐而無昏悶之患也推於十干十變知孔穴之開闔十干者甲乙丙丁戊己庚辛壬癸也十變者逐日臨時之變也備載於靈龜八法之中故得時為之開失時為之闔苟能明此則知孔穴之得失也論其五行五臟察日時之旺衰五行五臟俱注見前此言病於本日時之下得五行生者旺受五行克者衰知心之病得甲乙之日時者生旺遇壬癸之日時者克衰余皆仿此伏如橫弩應若發機此言用針之捷效如射之發中也陰交陽別而定血暈陰蹺陽維而下胎衣陰交穴有二一在臍下一寸一在足內踝上三寸名三陰之交也此言二穴能定婦人之血暈又言照海內關二穴能下産婦之胎衣也痹厥偏枯迎隨俾經絡接續痹厥者四肢厥冷麻痹也偏枯者中風半身不遂偏枯也言治此證必須接氣通經更以迎隨之法使血脈貫通經絡接續也漏崩帶下溫補使氣血依歸漏崩帶下者女子之疾也言有此證必須溫針待暖以補之使榮衛調和而歸依也靜以久留停針待之此言下針之後必須靜而久停之必准者取照海治喉中之閉塞端的處用大鐘治心內之呆癡照海等穴俱載折量法中故不重録大抵疼痛實瀉癢麻虛補此言疼痛者熱宜瀉之以涼癢麻者冷宜補之以暖體重節痛而俞居心下痞滿而井主俞者十二經中之俞穴井者十二經中之井也心脹咽痛針太衝而必除脾冷胃疼瀉公孫而立愈胸滿腹痛刺內關脅痛肋疼針飛虎太衝等穴俱載後圖但飛虎穴即章門穴也又云是支溝穴以手於虎口一飛中指盡處是穴也筋攣骨痛而補魂門體熱勞嗽而瀉魄戶頭風頭痛刺申脈與金門眼癢眼痛瀉光明於地五瀉陰郤止盜汗治小兒骨蒸刺偏歷利小便醫大人水蠱中風環跳而宜刺虛損天樞而可取地五者即地五會也由是午前卯後太陰生而疾溫離左酉南月死朔而速冷此以月生死為期午前卯後者辰巳二時也當此之時太陰月之生也是故月廓空無瀉宜疾溫之離左酉南者未申二時也當此之時太陰月之死也是故月廓盈無補宜速冷之將一月而比一日也經云月生一日一痏二日二痏至十五日十五痏十六日十四痏十七日十三痏漸退至三十日一痏也月望巳前謂之生月望巳後謂之死午前謂之生午後謂之死也循捫彈弩留吸母而堅長循者用針之後以手上下循之使血氣往來也捫者出針之後以手捫閉其穴使氣不泄也彈弩者以手輕彈而補虛也留吸母者虛則補其母須待熱之至後留吸而堅長也爪下伸提疾呼子而噓短爪下者切而下針也伸提者施針輕浮豆許曰提疾呼子者實則瀉其子務待寒至之後去之速而噓且短矣動退空歇迎奪右而瀉涼動退者以針搖動而退也如氣不行將針伸提而已空歇者撒手而停針也迎以針逆而迎之奪即瀉其子也如心之病必瀉脾胃之子此言欲瀉必施此法也推內進搓隨濟左而補暖推內進者用針推內而入也搓者猶如搓線之狀慢慢轉針勿令太緊也隨以針順而隨之濟則濟其母也如心之病必補肝膽之母此言欲補必用此法也慎之大凡危疾色脈不順而莫針慎之者戒之也此言有危篤之疾必觀其形色而察其脈若相反者莫與用針恐勞而無功反獲罪也寒熱風陰飢飽醉勞而切忌此言無針大寒大熱大風大陰雨大飢大飽大醉大勞凡此之類決不可用針實大忌也望不補而晦不瀉弦不奪而朔不濟望每月十五日也晦每月三十日也弦有上弦下弦上弦或初七或初八下弦或二十二或二十三也朔每月初一日也凡值此日不可用針施法也暴急之疾豈可拘於此哉精其心而窮其法無灸艾而壞其皮此言灸也勉醫者宜專心究其穴法無誤於著艾之功庶免於犯于禁忌而壞人之皮肉也正其理而求其原勉投針而失其位此言針也勉學者要明其針道之理察病之原則用針不失其所也避灸處而和四肢四十有九禁刺處而除六俞二十有二禁灸之穴四十五更和四肢之井共四十九也禁針之穴二十二外除六腑之俞也俱載於前抑又聞高皇抱疾未瘥李氏刺巨闕而復蘇太子暴死為厥越人針維會而再醒肩井曲池甄權刺臂痛而復射懸鐘環跳華他刺躄足而立行秋夫針腰俞而鬼免沉疴王纂針交俞而妖精立出取肝俞與命門使瞽士視秋毫之末刺少陽與交別俾聾夫聽夏蚋之聲此引先師用針有此立效之功以礪學者用心之誠耳且夫去聖逾遠此道漸墜或不得意而散其學或愆其能而犯禁忌愚庸智淺難契於玄言至道淵深得之者有幾偶述斯言不敢示諸明達者焉庶幾乎童蒙之心啓此先師嘆聖賢之古遠針道之漸衰理法幽深難造其極復以謙遜之言以結之籲竇太師乃萬世之師窮道契玄尚且謙言以示後學世之徒知一二而自矜自伐者豈不愧哉
