body:
  text: 卷之三周身折量法夫取穴之法必有分寸念鳳幸遇明師口傳心受逐部折量謹按明堂銅人資生甲乙諸經參考訂定孔穴集成歌括名曰周身折量法也使學者易於記誦則孔穴瞭然在目倘有未具以俟後之君子更加削正庶斯道之不朽云先論取周身寸法千金云尺寸之法依古者八寸為尺八分為寸仍取本人男左女右手中指上第一節為一寸又有取手大拇指第一節橫度為一寸以意消詳巧拙在人亦有長短不定者今考定以男左女右大指與中指相屈如環取中指中節橫紋上下相去長短為一寸謂之周身寸法為準則中指屈其中節以邊兩文之尖相去者量之是為一寸中指自上節下之橫文量至中節下之中文相去之間為一寸頭部中行一十四穴平眉三寸定髮際大杼三寸亦如是卻來折作尺二寸發上五分神庭位庭上五分名上星星上一寸囟會真前頂去囟一寸五頂上寸半百會所神聰百會四花求各取一寸風癇主後頂會後寸半中強間頂後過寸五腦戶去間寸五分戶後寸半定風府府下五分啞門中門下五分發際終更有明堂一穴差諸經俱作上星穴頭部中行折量法頭部二行左右一十四穴曲差俠庭寸半量五處仍俠上星傍處後承光寸半中寸半通天絡卻在玉枕橫紋於腦戶尺寸仍准銅人數天柱在頂後髮際大筋外廉陷中是眉沖二穴兩眉頭直上入髮際相求銅人經中不曾載明堂經載近曲差頭部三行左右一十二穴臨泣二穴當兩目直入髮際五分屬目窗泣後量一寸正營窗後一寸足承靈營後寸五分去靈寸半是腦空風池腦後取少陽陽經督會已當陽三穴直上入發一寸銅人不載明堂載風眩鼻塞不可廢也側頭部左右二十六穴腦空上廉為頷厭腦空之中號懸顱懸釐腦空下廉取耳上三寸天衝居率谷耳上一寸半曲鬢耳上當曲隅角孫耳廓當中取開口有空治目齒竅陰耳上動有空浮白耳後入髮際一寸之中審端的顱囟耳後青絡脈瘈脈耳本後邊中雞足青脈上相逢完骨耳後四分際耳尖後陷是翳風面部中行六穴素髎二穴鼻柱頭鼻下人中是水溝兌端開口唇珠上齦交唇內齒上求唇下宛宛承漿穴頷下廉泉到結喉面部二行左右十穴眉頭有穴名攢竹面眥之畔睛明屬巨髎八分俠鼻傍孔畔五分迎香錄更有禾髎俠人中相去五分左右同面部三行左右十穴面部三行十穴通眉上一寸陽白宮目下七分取承泣四白目下一寸同地倉四分俠口吻大迎曲頷前陷中面部四行左右十穴本神寸半曲差傍頭維本神寸五量絲竹空居眉後傍瞳子目眥五分詳顴髎面頰下廉取兌骨端下陷中當側面部左右十四穴更二穴上關一名客主人下關之禁久留針上關耳前開口取下關耳下合口尋前門目後量寸半聽會耳前陷中看耳前缺處號耳門聽宮耳前珠子畔耳下曲頰名頰車和窌上前銳發下肩膊部左右二十六穴肩膊之穴二十六缺盆之上肩井當天髎盆上毖骨際巨骨肩端上兩行肩之前廉為臑會肩髃膊骨陷中揣肩髎臑上舉臂取髃後肩貞當骨解臑腧髀上大骨中大骨之下名天宗天宗之前秉風穴肩中曲髀曲垣中肩外俞髀上廉折肩中俞髀下廉通背部中行十二穴上有大椎下尾骶分為二十有一椎古來自有折量法同身三寸而取俞七寸八分分上七上之七節即是椎平肩大椎大骨下第二陶道三身柱四柱無穴神道五靈臺第六柱下數至陽七椎八又缺筋縮九柱十又歇脊柱十一十二無十三椎下號懸樞十四命門穴十五陽關十六椎下睹十七至二十俱無二十一椎名腰俞下去更有長強穴請君逐一細尋之間中七節長二分大要十四與平臍一尺二寸一分四後有密戶宜審思背部二行左右四十六穴中行各開寸五分第一大杼二風門肺俞三柱厥陰四五椎之下是心俞督俞六椎膈俞七八柱無俞肝九覓膽俞下十一脾俞十二柱下胃俞知三焦腎俞氣海俞十三十四十五居大腸關元俞怎量十六十七椎兩旁十八椎下小腸俞十九椎下取膀胱中膂內俞柱二十白環二十一椎量上髎次髎中與下一空二空俠腰踝此為背部之二行又有會陽陰尾傍背部三行二十八穴去脊左右各三寸第二椎下名附分魄戶第三柱下取膏肓四椎下三分神堂第五噫嘻六膈關七柱八魂門陽綱十意舍十一胃倉十二椎下覓肓門十三直肋間志室十四椎下看胞肓二穴十九取秩邊二十椎下止側頸部左右十八穴曲頰之後名天容缺盆之上尋天牖完骨之下發際上天柱之穴天容後頸上大筋是天窗扶突後寸天鼎雙扶突人迎後寸半缺盆肩下橫骨當人迎穴在頸大脈此穴禁灸令人傷水突穴在人迎下氣舍又居天突傍膺部中行七穴天突喉下宛宛中璇璣突下一寸逢璣下一寸華蓋穴蓋下寸六分紫宮玉堂宮下一寸六兩乳中間是膻中中庭膻下仍寸六四穴各寸六分同膺部二行左右十二穴璇璣之傍二寸所巨闕之下尋俞府腑下寸六分彧中彧中寸六神藏逢神下寸六靈墟穴墟下寸六到神封封下寸六步廊是膺部二行穴盡矣膺部三行左右十二穴俞府之傍二寸尋穴名氣戶主胸襟庫房屋翳膺窗共各去一寸六分真乳中正當乳之上乳根乳下六分相膺部四行十二穴氣戶兩旁二寸分巨骨之下尋雲門云下一寸是中府周榮穴下六分中胸鄉天谿並食竇各下一寸六分同側腋部八穴腋下三寸名淵腋腋前一寸名輒筋天池在乳後一寸大包腋下六寸真腹部中行十五穴腹部中行尋鳩尾蔽骨之下五分是巨闕在尾下一寸尾下二寸上脘記尾下三寸中脘名尾下四寸是建里尾下五寸下脘中尾下六寸水分比神闕臍中氣合真臍下一寸陰交是臍下寸半氣海中臍下二寸石門裡臍下三寸名關元臍下四寸中極底曲骨毛際陷中求會陰兩陰間是矣腹部二行左右二十二穴幽門寸半巨闕邊下去一寸通谷然陰都石關及商曲肓俞中注四滿連氣穴大赫並橫骨各下一寸分明言腹部三行左右二十四穴幽門兩旁寸半是名曰不容依法取下有承滿與梁門關門太乙滑肉止以上各下一寸當天樞二穴俠臍傍樞下一寸外陵是陵下二寸名大巨水道在巨下三寸道下二寸歸來比氣衝又在歸來下鼠鼷之上一寸許腹部四行左右十四穴期門在腹肝之募不容穴旁寸半取日月門下五分求腹哀穴下一寸所大橫哀下三寸半腹結橫下三分看府舍在結下三寸橫下五寸衝門斷側脅部左右十二穴章門脾募季肋端監骨腰中京門看帶脈脅下一寸八五樞帶下三寸安五寸三分章門下維道有穴真無價居髎合取八寸三脅堂二骨門腋下手太陰肺之經左右十八穴少商大指端內側魚際本節後散脈太淵掌後陷中求經渠寸口陷中得列缺側腕上寸半腕上七寸孔最汗尺澤肘中動脈中俠白去肘五寸逢天府在腋下三寸以鼻取之焚灸同手陽明大腸之經左右二十八穴商陽鹽指內側邊二間來尋本節前三間節後陷中取合谷虎口岐骨間陽谿上側腕中是偏歷腕後三寸安溫留腕後去五寸池前五寸下廉看池前四寸上廉中池前二寸三里逢曲池曲骨紋頭盡肘髎大骨外廉近大脈中央尋五里肘上三寸行向里臂臑肘上七寸量兩筋兩骨陷中取手厥陰心包絡之經左右十六穴中指內端是中衝勞宮橫紋在掌中大陵掌後兩筋陷內關掌後二寸同掌後三寸名間使郄門去腕五寸所曲澤肘腕橫紋中腋下三寸天泉府手少陽三焦之經左右二十四穴無名指外端關衝指間節前液門中中渚本節後陷比陽池手表腕上取外關腕後二寸求腕後三寸是支溝會宗二穴在腕後三寸空中一寸留腕後四寸三陽絡四瀆肘前五寸著天井肘外骨後遷肘上三寸清冷淵消濼二穴在肩下臂外腋斜肘分下手少陰心之經左右十八穴小指內廉端少衝少府掌內直勞宮神門掌後兌骨際去掌五分陰郄中掌後一寸名通里掌後寸半靈道是少海肘內橫紋取青靈肘上三寸許極泉液下筋間認動脈入胸詢仔細手太陽小腸之經左右十六穴少澤小指外廉端前谷側本節前看後谿節後掌紋盡腕骨外側陷中安陽谷腕側兌骨下養老骨上尋外踝支正腕後五寸在少海肘端五分外足太陰脾之經左右二十二穴大指端內側隱白本節後陷求大都太白內側核骨下節後一寸公孫乎商丘內踝微前高踝上三寸三陰交漏谷踝上六寸是地機膝下五寸取膝下內側陰陵泉血海膝臏上內廉箕門一穴在魚腹動脈應手越筋間足厥陰肝之經左右二十二穴足大指端名大敦行間足指外邊逢太衝本節後二寸踝前一寸號中封蠡溝踝上五寸是中都踝上七寸中膝關犢鼻下二寸曲泉曲膝盡橫紋陰包膝上四寸許氣衝下三寸五里陰廉離氣衝二寸動脈中央下羊矢足陽明胃之經左右三十穴厲兌指端是二指內庭次指外間取陷谷去庭二寸間衝陽去庭五寸止解谿去庭六寸半豐隆外踝八寸比下巨虛膝下八寸條口膝下五寸許上巨膝下四寸中膝下三寸是三里犢鼻穴在膝臏下梁丘膝上二寸已陰市膝上三寸求伏兔膝上六寸取髀關穴在伏兔後膝根四穴膝前矣足少陰腎之經左右二十穴足掌心中是湧泉然谷直上內踝前太谿踝後跟骨上大鐘足跟後沖遷水泉谿下一寸覓照海內踝下微前此穴即是陰蹺絡復溜踝上二寸連交信踝上直二寸太陰之後少陰前築賓內踝上腨分陰谷膝內骨後邊足少陽膽之經左右二十八穴第四指端是竅陰俠谿本節陷中尋去谿一寸地五會臨泣去地寸半真丘墟外踝前陷中踝上三寸是懸鐘踝上四寸名陽輔光明踝上五寸通外丘陽交同七寸陽陵膝下一寸逢陽關之上二寸外膝上五寸中瀆中風市垂手中指盡環跳在硯子骰中側臥屈上伸下足取之得法治諸風足太陽膀胱之經左右三十六穴小指外側至陰足本節後陷中通谷束骨節後陷中求骨下肉際尋京骨陽蹺踝下即申脈金門外踝下取得僕參隅中跟骨下崑崙跟後尋骨踝踝上三寸跗陽當踝上九寸名飛揚承山兌腨腸下取承筋在腨腸中央合陽委中下一寸委中在膕紋中張委陽外廉兩筋內浮郄在陽一寸上殷門郄上六寸比承扶臀下陰沖止
