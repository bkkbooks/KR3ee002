body:
  text: 卷之五此金針賦乃先師祕傳之要法得之者每每私藏而不以示人必待價之金乃可得也豫今以活人為心更不珍藏載於卷中與同志之士共知學者慎勿輕視若能熟讀詳味久當見之則用針之法盡於此矣金針賦序大明洪武庚辰仲春豫學針法初學於洞玄先生孟仲倪公明年公沒過維陽又學於東隱先生九思彭公深得二先生髮明竇太師針道之書梓岐風谷飛經走氣補瀉之法遊江湖間以之參問他師皆不過能談其概及求精微之妙百無一二間有知者亦莫盡知其奧豫於是甚悅於心則知世所得者鮮矣固深胸臆寶而重之數年間用之而百發百中無不臻效永樂己丑惜豫遭誣徙居於民樂耕鋤之內故退寓西河立其堂曰資深其號曰泉石心以遁守自娛過者皆曰此讀書耕者之所也凡有疾者求治不用於針多用於灸自是梓岐風谷之法荒廢而名不聞非不以濟人之心為心蓋不欲取譽於時矣今也豫年向暮髭鬢皆霜恐久失傳拳拳在念正統己未春末養疾之暇閲其所傳針法之書繁而無統於是撮其簡要不愧疏庸編集成文名曰金針賦金乃世之寶也非富貴不能得之豈貧賤所能有也名其金稱其貴也貴能劫疾於頃刻之間故以觀夫發端而嗟夫結之則深嘆美其法而有收效之捷異耳篇中首論頭病取足左病取右男女早晚之氣手足經絡順逆之理次論補瀉下針調氣出針之法末論治病驅運氣血通接至微之妙而又叮嚀勉其學者務必以盡精誠則可以起沉疴之疾言雖直簡其義詳明尤其貫穿次第有序使後之學者易為記誦其傳不泯俟他日有竇漢卿復出而攻之熟造之深得於心而應手顯用光大必念乎今之刪繁撮簡成文者誰歟是亦遺言於後也必學者敬之哉時正統四年己未歲八月既望梓岐風谷飛經撮要金針賦觀夫針道捷法最奇須要明於補瀉方可起於傾危先分病之上下次定穴之高低頭有病而足取之左有病而右取之男子之氣早在上而晚在下取之必明其理女子之氣早在下而晚在上用之必識其時午前為早屬陽午後為晚屬陰男女上下憑腰分之手足三陽手走頭而頭走足手足三陰足走腹而胸走手陰升陽降出入之機逆之者為瀉為迎順之者為補為隨春夏刺淺者以瘦秋冬刺深者以肥更觀原氣之厚薄刺分淺深之尤宜原夫補瀉之法妙在呼吸手指男子者大指進前左轉呼之為補退後右轉吸之為瀉提針為熱插針為寒女子者大指退後右轉吸之為補進前左轉呼之為瀉插針為熱提針為寒左與右有異胸與背不同午前者如此午後者反之是故爪而切之下針之法搖而退之出針之法動而進之催針之法循而攝之行氣之法搓則去病彈則補虛肚腹盤旋捫為穴閉沉重豆許曰按輕浮豆許曰提一十四法針要所備補者一退三飛真氣自歸瀉者一飛三退邪氣自避補則補其不足瀉則瀉其有餘有餘者為腫為痛曰實不足者為癢為麻曰虛氣速效速氣遲效遲死生富貴針下皆知賤者硬而貴者脆生者澀而死者虛候之不至必死無疑且夫下針之法先須爪按重而切之次令咳嗽一聲隨咳下針凡補者呼氣初針刺至皮肉乃曰天才少停進針刺至肉內是曰人才又停進針刺之筋骨之間名曰地才此為極處就當補之再停良久卻須退針至人之分待氣沉緊倒針朝病進退往來飛經走氣盡在其中矣凡瀉者吸氣初針至天少停進針直至於地得氣瀉之再停良久卻須退針復至於人待氣沉緊倒針朝病法同前矣其或暈針者神氣虛也以針補之以袖搗之口鼻而氣回熱湯與之略停少頃依前再施之及夫調氣之法下針至地之後復人之分欲氣上行將針右捻欲氣下行將針左捻欲補先呼後吸欲瀉先吸後呼氣不至者以手循攝以爪切掐以針搖動進捻搓彈直待氣至以龍虎升騰之法按之在前使氣在後按之在後使氣在前運氣走至疼痛之所以納氣之法扶針直插復向下納使氣不回若關節阻澀氣不過者以龍虎龜鳳通經接氣大段之法驅而運之仍以循攝爪切無不應矣此通仙之妙況夫出針之法病勢既退針氣微松病未退者針氣如根推之不動轉之不移此為邪氣吸拔其針乃真氣未至不可出之出之者其病即復再須補瀉停以待之直候微松方可出針豆許搖而停之補者吸之去疾其穴急捫瀉者呼之去徐其穴不閉欲令腠密然後調氣故曰下針貴遲太急傷血出針貴緩太急傷氣以上總要於斯盡矣考夫治病之法有八一曰燒山火治頑麻冷痹先淺後深用九陽而三進三退慢提緊按熱至緊閉插針除寒有準二曰透天涼治肌熱骨蒸先深後淺用六陰而三出三入緊提慢按徐徐舉針退熱之可憑皆細細搓之去病準繩三曰陽中之陰先寒後熱淺而深以九六之法則先補後瀉也四曰陰中之陽先熱後寒深而淺以六九之方則先瀉後補也補者直須熱至瀉者務待寒侵猶如搓線慢慢轉針蓋法在淺則用淺法在深則用深二者不可兼而紊之也五曰子午搗臼水蠱膈氣落穴之後調氣均勻針行上下九入六出左右轉之十遭自平六曰進氣之訣腰背肘膝痛渾身走注疼刺九分行九補臥針五七吸待氣上行亦可龍虎交戰左捻九而右捻六是亦住痛之針七曰留氣之訣痃瘕癖癥針刺七分用純陽然後乃直插針氣來深刺提針再停八曰抽添之訣癱瘓瘡癩取其要穴使九陽得氣提按搜尋大要運氣周遍扶針直插復向下納回陽倒陰指下玄微胸中活法一有未應反復再施若夫過關過節催運氣血以飛經走氣其法有四一曰青龍擺尾如扶船舵不進不退一左一右慢慢撥動二曰白虎搖頭似手搖鈴退方進圓兼之左右搖而振之三曰蒼龜探穴如入土之象一退三進鑽剔四方四曰赤鳳迎源展翅之儀入針至地提針至天候針自搖復進其元上下左右四圍飛旋病在上吸而退之病在下呼而進之至夫久患偏枯通經接氣之法已有定息寸數手足三陽上九而下十四過經四寸手足三陰上七而下十二過經五寸在乎搖動出納呼吸同法驅運氣血頃刻周流上下通接可使寒者暖而熱者涼痛者止而脹者消若開渠之決水立時見功何傾危之不起哉難曰病有三因皆從氣血針分八法不離陰陽蓋經絡晝夜之循環呼吸往來之不息和則身體康健否則疾病競生譬如天下國家地方山海田園江河溪谷值歲時風雨均調則水道疏利民安物阜其或一方一所風雨不均遭以旱潦使水道湧竭不通災傷遂至人之氣血受病三因亦猶方所之旱潦也蓋針砭所以通經脈均氣血蠲邪扶正故曰捷法最奇者哉嗟夫軒岐古遠盧扁死亡此道幽深非一言而可盡斯文細密在久習而能通豈世上之常辭庸流之乏術得之者若科之及第而悅於心用之者如射之發中而進於目述自先賢傳之後學用針之士有志於斯果能洞造玄微而盡其精妙則世之伏枕之疴有緣者遇針到病除隨手而愈論子午流注之法夫子午流注者剛柔相配陰陽相合氣血循環時穴開闔也何以子午言之曰子時一刻乃一陽之生至午時一刻乃一陰之生故以子午分之而得乎中也流者往也注者住也天干有十經有十二甲膽乙肝丙小腸丁心戊胃己脾庚大腸辛肺壬膀胱癸腎余兩經者乃三焦包絡也三焦乃陽氣之父包絡乃陰血之母此二經雖寄於壬癸亦分派於十干且每經之中有井滎俞經合以配金水木火土是故陰井木而陽井金陰滎火而陽滎水陰俞土而陽俞木陰經金而陽經火陰合水而陽合土矣經中必有返本還原者乃十二經出入之門戶也陽經有原遇俞穴並過之陰經無原以俞穴即代之是以甲出丘墟乙太衝之例又按千金云六陰經亦有原穴乙中都丁通里己公孫辛列缺癸水泉包絡內關也故陽日氣先行而血後隨也陰日血先行而氣後隨也得時為之開失時為之闔陽干注腑甲丙戊庚壬而重見者氣納於三焦陰乾注臟乙丁己辛癸而重見者血納包絡如甲日戌時以開膽井至戊寅時正當胃俞而又並過膽原重見甲申時氣納三焦滎穴屬水甲屬木是以水生木謂甲合還元化本又如乙日乙酉時以開肝井至己丑時當脾之俞並過肝原重見乙未時血納包絡滎穴屬火乙屬木是以木生火也余皆依此俱以子午相生陰陽相濟也陽日無陰時陰日無陽時故甲與己合乙與庚合丙與辛合丁與壬合戊與癸合也何以甲與己合曰中央戊己屬土畏東方甲乙之木所克戊屬陽為兄己屬陰為妹戊兄遂將己妹嫁與木家與甲為妻庶得陰陽和合而不相傷所以甲與己合余皆然子午之法盡於此矣五虎建元日時歌甲己之日丙寅起乙庚之辰戊寅頭丙辛便從庚寅起丁壬壬寅順行求戊癸甲寅定時候六十首法助醫流十二經納天干歌甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎臟三焦亦向壬中寄包絡同歸入癸方十二經納地支歌肺寅大卯胃辰宮脾巳心午小未中申胱酉腎心包戌亥三子膽醜肝通十二經之原歌甲出丘墟乙太衝丙居腕骨是原中丁出神門原內過戊胃衝陽氣可通己出太白庚合谷辛原本出太淵同壬歸京骨陽池穴癸出太溪大陵中子午流注十二經井滎俞原經合歌手大指內太陰肺少商為井滎魚際太淵之穴號俞原行入經渠尺澤類鹽指陽明曰大腸商陽二間三間詳合谷陽溪依穴取曲池為合正相當中指厥陰心包絡中衝掌中勞宮索大陵為俞本是原間使從容求曲澤無名指外是三焦關衝尋至液門頭俞原中渚陽池取經合支溝天井求手小指內少陰心少衝少府井滎尋神門俞穴為原穴靈道仍須少海真手小指外屬小腸少澤流於前谷內後溪腕骨之俞原陽谷為經合少海足大指內太陰脾井滎隱白大都推太白俞原商丘穴陰陵泉合要須知足大指端厥陰肝大敦為井滎行間太衝為俞原都是經在中封合曲泉足第二指陽明胃厲兌內庭須要會陷谷衝陽經解溪三里膝下三寸是足掌心中少陰腎湧泉然谷天然定太溪腎俞又為原復溜陰谷能醫病足第四指少陽經竅陰為井俠溪滎俞原臨泣丘墟穴陽輔陽陵泉認真足小指外屬膀胱至陰通谷井滎當束骨次尋京骨穴崑崙經合委中央子午流注逐日按時定穴訣甲日戌時膽竅陰丙子時中前谷滎戊寅陷谷陽明俞返本丘墟木在寅庚辰經注陽溪穴壬午膀胱委中尋甲申時納三焦水滎合天干取液門乙日酉時肝大敦丁亥時滎少府心己丑太白太衝穴辛卯經渠是肺經癸巳腎宮陰谷合乙未勞宮水穴滎丙日申時少澤當戊戌內庭治脹康庚子時在三間俞本原腕骨可祛黃壬寅經火崑崙上甲辰陽陵泉合長丙午時受三焦木中渚之中子細詳丁日未時心少衝己酉大都脾土逢辛亥太淵神門穴癸丑復溜腎水通乙卯肝經曲泉合丁巳包絡大陵中戊日午時厲兌先庚申滎穴二間遷壬戌膀胱尋束骨衝陽土穴必還原甲子膽經陽輔是丙寅小海穴安然戊辰氣納三焦脈經穴支溝刺必痊己日巳時隱白始辛未時中魚際取癸酉太蹊太白原乙亥中封內踝比丁丑時合少海心己卯間使包絡止庚日辰時商陽居壬午膀胱通谷之甲申臨泣為俞木合谷金原返本歸丙戌小腸陽谷火戊子時居三里宜庚寅氣納三焦合天井之中不用疑辛日卯時少商本癸巳然谷何須忖乙未太衝原太淵丁酉心經靈道引己亥脾合陰陵泉辛丑曲澤包絡準壬日寅時起至陰甲辰膽脈俠溪滎丙午小腸後溪俞返求京骨本原尋三焦寄有陽池穴返本還原似的親戊申時注解溪胃大腸庚戌曲池真壬子氣納三焦寄井穴關衝一片金關衝屬金壬屬水子母相生恩義深癸日亥時井湧泉乙丑行間穴必然丁卯俞穴神門是本尋腎水太溪原包絡大陵原並過己巳商丘內踝邊辛未肺經合尺澤癸酉中衝包絡連子午截時安定穴留傳後學莫忘言右子午流注之法無以考焉雖針灸四書所載尤且不全還元返本之理氣血所納之穴俱隱而不具豫今將流注按時定穴編成歌括一十首使後之學者易為記誦臨用之時不待思忖且後圖乃先賢所綴故不敢廢備載於後庶有所證耳原圖十二今分十耳少商二穴在手大指端內側去爪甲如韭葉許魚際二穴在手大指本節後內側散脈中太淵二穴在掌後橫紋陷中經渠二穴在手掌後寸口脈中列缺二穴在手側腕上指相叉指處是穴尺澤二穴在手肘約紋中商陽二穴在手大指次指內側去爪甲角如韭葉許二間二穴在次指本節前內側陷中三間二穴在本節後內廉側陷中合谷二穴在虎口岐骨之間陷中陽溪二穴在手腕上側陷中曲池二穴在肘外輔骨屈肘曲骨之中中衝二穴在手中指內廉之端去爪甲如韭葉勞宮二穴在手掌中心大陵二穴在手掌後橫紋中內關二穴在手掌後二寸中兩筋間間使二穴去內關一寸在掌後三寸中曲澤二穴在手肘內廉陷中曲肘得之關衝二穴在手無名指端內廉去爪甲如韭葉許液門二穴在小指次指本節前陷中中渚二穴在本節後陷中握拳取之陽池二穴在手表腕上陷中支溝二穴在手腕後三寸兩筋骨之間天井二穴在肘外大骨後肘上陷中少衝二穴在手小指內廉端去爪甲如韭葉少府二穴在手掌內小指本節後陷中直勞宮神門二穴在手掌後兌骨之端通里二穴在掌後一寸靈道二穴在掌後一寸五分少海二穴在肘內廉橫紋頭曲手取之少澤二穴在手小指之端外廉去爪甲一分前谷二穴在手小指外側本節前陷中後溪二穴在外側本節後橫紋尖上陷中腕骨二穴在手外側腕前起骨下陷中陽谷二穴在手外側骨踝下小海二穴在肘內大骨外廉去肘端五分陷中隱白二穴在足大指內側端去爪甲如韭葉大都二穴在大指本節後陷中太白二穴在大指內側核骨下陷中公孫二穴在大指內側去本節後一寸商丘二穴在足內踝微前陰陵泉二穴在足膝下內側輔骨下陷中大敦二穴在足大指端去爪甲一分行間二穴在大指外間動脈應手太衝二穴在大指本節後二寸動脈中中封二穴在內踝前一寸仰足取之中都二穴在內踝上七寸曲泉二穴在膝內輔骨下橫紋盡處厲兌二穴在足大指次指端去爪甲一分內庭二穴在足次指外間陷中陷谷二穴在足次指本節後陷中去內庭二寸衝陽二穴在足跗上去內庭五寸解溪二穴在足腕上系草鞋練處陷中三里二穴在膝下三寸大筋內宛宛中湧泉二穴在足掌心陷中屈足卷指取之然骨二穴在足內踝前大骨下太溪二穴在足內踝後踝上動脈之中水泉二穴在太溪下一寸復溜二穴在足內踝上二寸陰谷二穴在足膝內輔骨後大筋下小筋上竅陰二穴在足第四指端去爪甲一分俠溪二穴在足四指外岐骨間本節前臨泣二穴在本節後去俠溪一寸五分丘墟二穴在足外踝微前陷中陽輔二穴在足外踝上四寸輔骨前絶骨端如前三分陽陵泉二穴在膝下骨下宛宛中至陰二穴在足小指外側去爪甲角一分通谷二穴在足小指外側本節前陷中束骨二穴在小指本節後陷中京骨二穴在指外側大骨下赤白肉際崑崙二穴在外踝後跟骨上委中二穴在足膝腕內膕內約紋中
