body:
  text: 卷之四竇文真公八法流注論經脈有奇經八脈難經云脈有奇經八脈者不拘於十二經何謂也然有陽維有陰維有陽蹺有陰蹺有沖有任有督有帶之脈凡此八脈皆不拘於經故曰奇經八脈也經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不然天雨降下溝渠溢滿當此之時雱霈妄行聖人不能復圖也此絡脈滿溢諸經不能復拘也既不拘於十二經絡皆從何起何繼詳見下文奇經八脈周身交會歌督脈起自下極腧並與脊裡上風府過腦額鼻入齗交為陽脈海都綱要任脈起於中極底上腹循喉承漿里陰脈之海任所為衝脈出胞至胸止從腹會咽絡口唇女人成經為血室脈並少陰之腎經與任督本於會陰三脈並起而異行陽蹺起足跟之底循外踝上入風池陰蹺內踝循喉嗌本是陰陽脈別支諸陰會起陰維脈發足少陰築賓郤諸陽會起陽維脈太陽之郤金門是帶脈周回季脅間會於維道足少陽所謂奇經之八脈維繫諸經乃順常八脈交會八穴歌公孫衝脈胃心胸內關陰維下總同臨泣膽經連帶脈陽維目鋭外關逢後溪督脈內眥頸申脈陽蹺絡亦通列缺任脈行肺系陰蹺照海膈喉嚨八脈配八卦歌乾屬公孫艮內關巽臨震位外關還離居列缺坤照海後溪兌坎申脈間補瀉浮沉分逆順得時呼吸不為難祖傳祕訣神針法萬病如拈立便安八穴相配合歌公孫偏與內關合列缺能消照海疴臨泣外關分主客後溪申脈正相合左針右病知高下以意通經廣按摩補瀉迎隨分逆順五門八法是真科八法逐日乾支歌甲己辰戌丑未十乙庚申酉九為期丁壬寅卯八成就戊癸巳午七相依丙辛亥子亦七數逐日乾支即得知八法臨時干支歌甲己子午九宜用乙庚丑未八無疑丙辛寅申七作數丁壬卯酉六須知戊癸辰戌各有五巳亥單加四共齊陽日除九陰除六不及零餘穴下推按靈龜飛騰圖有二人莫適從今取其效驗者録之耳假如甲子日戊辰時就數逐日支幹內甲得十數子得七數又算臨時支幹內戊得五數辰得五數共成二十七數此是陽日該除二九一十八數余有九數離九列缺穴也又如乙丑日壬午時就算逐日支幹內乙得九數醜得十數又算臨時支幹內壬得六數午得九數共成三十四數此是陰日該除五六方三十數零有四數是巽四臨泣也余皆仿此飛騰八法歌與前法不同壬甲公孫即是乾丙居艮上內關然戊午臨泣生坎水庚屬外關震相連辛上後溪裝巽卦乙癸申脈到坤傳己土列缺南離上丁居照海兌金全其法只取本時天干為例假如甲己日戊辰時即取戊干臨泣穴己巳時即列缺庚午時即外關余皆仿此愚謂奇經八脈之法各有不相同前靈龜八法有陽九陰六十干十變開闔之理用之得時無不捷效後飛騰八法亦明師所授故不敢棄亦載於此以示後之學者八法交會八脈公孫二穴父通衝脈內關二穴母通陰維脈合於心胸胃後溪二穴夫通督脈申脈二穴妻通陽蹺脈合於目內眥頸項耳肩膊小腸膀胱臨泣二穴男通帶脈外關二穴女通陽維脈合於目內眥耳後頰頸肩列缺二穴主通任脈照海二穴客通陰蹺脈合於肺系咽喉胸膈八法主治病證公孫二穴通衝脈脾之經在足大指內側本節後一寸陷中令病人坐合兩掌相對取之主治三十一證凡治後證必先取公孫為主次取各穴應之九種心疼一切冷氣大陵二穴中脘一穴隱白二穴痰膈涎悶胸中隱痛勞宮二穴膻中一穴間使二穴臍腹脹滿氣不消化天樞二穴水分一穴內庭二穴脅肋下痛起止艱難支溝二穴章門二穴陽陵泉二穴泄瀉不止裡急後重下脘一穴天樞二穴照海二穴胸中刺痛隱隱不樂內關二穴大陵二穴彧中二穴兩脅脹滿氣攻疼痛陽陵泉二穴章門二穴絶骨二穴一名懸鐘中滿不快翻胃吐食中脘一穴太白二穴中魁二穴一名陽溪氣膈五噎飲食不下膻中一穴三里二穴太白二穴胃脘停痰口吐清水巨闕一穴厲兌二穴中脘一穴中脘停食疼刺不已解溪二穴太倉一穴一名中脘穴三里二穴嘔吐痰涎眩暈不已豐隆二穴中魁二穴膻中一穴心瘧令人心內怔忡神門二穴心俞二穴百勞一穴即大椎穴脾瘧令人怕寒腹中痛商丘二穴脾俞二穴三里二穴肝瘧令人氣色蒼蒼惡寒發熱中封二穴肝俞二穴絶骨二穴肺瘧令人心寒怕驚列缺二穴肺俞二穴合谷二穴腎瘧令人灑熱腰脊強痛大鐘二穴腎俞二穴申脈二穴瘧疾大熱不退間使二穴百勞一穴絶骨二穴瘧疾先寒後熱後溪二穴曲池二穴勞宮二穴瘧疾先熱後寒曲池二穴百勞一穴絶骨二穴瘧疾心胸疼痛內關二穴上脘一穴大陵二穴瘧疾頭痛眩暈吐痰不已合谷二穴中脘一穴列缺二穴瘧疾骨節痠痛魄戶二穴百勞一穴然谷二穴瘧疾口渴不已關衝二穴人中一穴間使二穴胃瘧令人善飢而不能食厲兌二穴胃俞二穴大都二穴膽瘧令人惡寒怕驚睡臥不安臨泣二穴膽俞二穴期門二穴黃疸四肢俱腫汗出染衣至陽一穴百勞一穴腕骨二穴中脘一穴三里二穴黃疸遍身皮膚及面目小便俱黃脾俞二穴隱白二穴百勞一穴至陽一穴三里二穴腕骨二穴榖疸食畢則頭眩心中拂鬱遍體發黃胃俞二穴內庭二穴至陽一穴三里二穴腕骨二穴陰谷二穴酒疸身目俱黃心中俱痛面發赤斑小便赤黃膽俞二穴至陽一穴委中二穴腕骨二穴女癆疸身目俱黃發熱惡寒小便不利關元一穴腎俞二穴然骨二穴至陽一穴內關二穴陰維脈心包絡之經在掌後二寸兩筋之間陷中令患人穩坐仰手取之主治二十五證中滿不快胃脘傷寒中脘一穴大陵二穴三里二穴中焦痞滿兩脅刺痛支溝二穴章門二穴膻中一穴脾胃虛冷嘔吐不已內庭二穴中脘一穴氣海一穴公孫二穴脾胃氣虛心腹脹滿太白二穴三里二穴氣海一穴水分一穴