絶骨二穴委中二穴陽陵泉穴三陰交穴渾身脹滿浮腫生水氣海一穴三里二穴曲池二穴合谷二穴內庭二穴行間二穴三陰交穴單腹蠱脹氣喘不息膻中一穴氣海一穴水分一穴三里二穴行間二穴三陰交穴心腹脹大如盆中脘一穴膻中一穴水分一穴行間二穴三陰交穴四肢面目浮腫大熱不退人中一穴合谷二穴三里二穴臨泣二穴曲池二穴三陰交二穴婦人虛損形瘦赤白帶下百會一穴腎俞二穴關元一穴三陰交二穴女人子宮久冷不受胎孕中極一穴三陰交穴子宮二穴在中極兩旁各二寸女人經水正行頭暈小腹痛陰交一穴內庭二穴合谷二穴室女月水不調臍腹疼痛天樞一穴氣海一穴三陰交二穴室女月水不調淋瀝不斷腰腹痛腎俞二穴關元一穴三陰交二穴婦人産難不能分娩三陰交穴合谷二穴獨陰二穴即至陰穴灸列缺二穴通任脈肺之經在手腕後一寸五分以兩穴相來鹽指頭盡處是穴兩筋間主治三十三證鼻流濁涕臭名曰鼻淵曲差二穴上星一穴百會一穴風門二穴迎香二穴鼻生息肉閉塞不通印堂一穴迎香二穴上星一穴風門二穴傷風面赤發熱頭痛通里二穴曲池二穴絶骨二穴合谷二穴傷風感寒咳嗽脹滿膻中一穴風門二穴合谷二穴風府一穴傷風四肢煩熱頭痛經渠二穴曲池二穴合谷二穴委中二穴腹中腸痛下利不已內庭二穴天樞二穴三陰交二穴赤白痢疾腹中冷痛水道二穴氣海一穴外陵二穴天樞二穴三里二穴三陰交二穴胸前兩乳紅腫痛少澤二穴大陵二穴膻中一穴乳癰紅腫痛小兒吹乳中府二穴膻中一穴少澤二穴大敦二穴腹中寒痛泄瀉不止天樞二穴中脘一穴關元一穴三陰交二穴婦人血積痛敗血不止肝俞二穴腎俞二穴膈俞二穴三陰交穴咳嗽寒痰胸膈閉痛肺俞二穴膻中一穴三里二穴久咳不愈咳唾血痰風門二穴太淵二穴膻中一穴哮喘氣促痰氣壅盛豐隆二穴俞府二穴膻中一穴三里二穴吼喘胸膈急痛彧中二穴天突一穴肺俞二穴三里二穴吼喘氣滿肺脹不得臥俞府二穴風門二穴太淵二穴膻中一穴中府二穴三里二穴鼻塞不知香臭迎香二穴上星一穴風門二穴鼻流清涕腠理不密清涕不止神庭一穴肺俞二穴太淵二穴三里二穴婦人血瀝乳汁不通少澤二穴大陵二穴膻中一穴關衝二穴乳頭生瘡名曰妒乳乳根二穴少澤二穴肩井二穴膻中一穴胸中噎塞痛大陵二穴內關二穴膻中一穴三里二穴五癭等證夫項癭之證有五一曰石癭如石之硬二曰氣癭如綿之軟三曰血癭如赤脈細絲四曰筋癭乃無骨五曰肉癭如袋之狀此乃五癭之形也扶突二穴天突一穴天窗二穴缺盆二穴俞府二穴膺俞一穴喉上膻中一穴合谷二穴十宣十穴出血口內生瘡臭穢不可近十宣十穴人中一穴金津一穴玉液一穴承漿一穴合谷二穴三焦熱極舌上生瘡關衝二穴外關二穴人中一穴迎香二穴金津一穴玉液一穴地倉二穴口氣衝人臭不可近少衝二穴通里二穴人中一穴十宣十穴金津一穴玉液一穴冒暑大熱霍亂吐瀉委中二穴百勞一穴中脘一穴曲池二穴十宣十穴三里二穴合谷二穴中暑自熱小便不利陰谷二穴百勞一穴中脘一穴委中二穴氣海一穴陰陵泉穴小兒急驚風手足搐搦印堂一穴百會一穴人中一穴中衝二穴大敦二穴太衝二穴合谷二穴小兒慢脾風目直視手足搐口吐沫百會一穴上星一穴人中一穴大敦二穴脾俞二穴消渴等證三消其證不同消脾消中消腎素問云胃府虛飲食鬥不能充飢腎臟渴飲百杯不能止渴及房勞不稱心意此為三消也乃土燥承渴不能克化故成此人中一穴公孫二穴脾俞二穴中脘一穴照海二穴三里二穴治食不充飢太溪二穴治房不稱心關衝二穴黑砂腹痛頭疼發熱惡寒腰背強痛不得睡臥百勞一穴天府二穴委中二穴十宣十穴白砂腹痛吐瀉四肢厥冷十指甲黑不得睡臥大陵二穴百勞一穴大敦二穴十宣十穴黑白砂腹痛頭疼發汗口渴大腸泄瀉惡寒四肢厥冷不得睡臥名曰絞腸砂或腸鳴腹響委中二穴膻中一穴百會一穴丹田一穴大敦二穴竅陰二穴十宣十穴以上八脈主治諸證用之無不捷效但臨時看證先取主治之穴次取隨證各穴而應之或行針或著艾在乎用之者之能以臨時機變活法施之不可獨拘於針也
